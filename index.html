  firebase.initializeApp(FIREBASE_CONFIG);

  // Sign in anonymously so database rules (auth != null) are satisfied.
  auth.signInAnonymously().catch(() => {});

  // ── Helpers ───────────────────────────────────────────────────────────────
  function fbToArray(val) {
    if (!val) return [];
    if (Array.isArray(val)) return val.map(item => fbNormalise(item));
    return Object.keys(val).sort((a,b)=>Number(a)-Number(b)).map(k => fbNormalise(val[k]));
  }
  function fbNormalise(obj) {
    if (!obj || typeof obj !== "object" || Array.isArray(obj)) return obj;
    const out = {...obj};
    ["history"].forEach(field => {
      if (out[field] !== undefined) out[field] = fbToArray(out[field]);
    });
    return out;
  }

  // ── One-time migration: /team → /teams/prime9u ───────────────────────────
  // Runs after auth. If /teamsMeta/prime9u doesn't exist but /team does,
  // copies the data and creates the meta entry, then clears /team.
  window.__fbMigrateIfNeeded = function() {
    return db.ref("teamsMeta/prime9u").once("value").then(snap => {
      if (snap.exists()) return; // already migrated
      return db.ref("team").once("value").then(oldSnap => {
        const oldData = oldSnap.val() || {};
        const meta = {
          name: "Prime 9U",
          rules: { maxPitches: 55, rest1: 20, rest2: 40, rest3: 60 },
          createdAt: new Date().toISOString().split("T")[0]
        };
        const writes = {};
        writes["teamsMeta/prime9u"] = meta;
        writes["teams/prime9u/roster"]      = oldData.roster      || null;
        writes["teams/prime9u/tournaments"] = oldData.tournaments || null;
        return db.ref().update(writes);
      });
    }).catch(() => {});
  };

  // ── Team meta (list / create / update / delete) ──────────────────────────
  window.__fbListTeams = function() {
    return db.ref("teamsMeta").once("value").then(snap => {
      const val = snap.val() || {};
      return Object.entries(val).map(([id, meta]) => ({ id, ...meta }));
    });
  };

  window.__fbCreateTeam = function(teamId, meta) {
    return db.ref("teamsMeta/" + teamId).set(meta);
  };

  window.__fbUpdateTeamMeta = function(teamId, meta) {
    return db.ref("teamsMeta/" + teamId).update(meta);
  };

  window.__fbDeleteTeam = function(teamId) {
    // Read current data, archive it, then delete originals
    return Promise.all([
      db.ref("teamsMeta/" + teamId).once("value"),
      db.ref("teams/" + teamId).once("value"),
    ]).then(([metaSnap, dataSnap]) => {
      const writes = {};
      writes["archive/" + teamId + "/meta"]        = metaSnap.val();
      writes["archive/" + teamId + "/data"]        = dataSnap.val();
      writes["archive/" + teamId + "/archivedAt"]  = new Date().toISOString();
      writes["teamsMeta/" + teamId]                = null;
      writes["teams/" + teamId]                    = null;
      return db.ref().update(writes);
    });
  };

  // ── Subscribe to a specific team's data ──────────────────────────────────
  window.__fbSubscribe = function(onData, onConnected, onOffline, teamId) {
    const unsubscribeAuth = auth.onAuthStateChanged(user => {
      if (!user) return;
      unsubscribeAuth();
      startListener();
    });

    let cleanupListener = () => {};

    function startListener() {
      const ref = db.ref("teams/" + teamId);
      let everConnected = false;
      db.ref(".info/connected").on("value", snap => {
        if (snap.val()) { everConnected = true; onConnected(); }
        else if (everConnected) onOffline();
      });
      ref.on("value", snap => {
        const val = snap.val() || {};
        onData({ roster: fbToArray(val.roster), tournaments: fbToArray(val.tournaments) });
      }, () => onOffline());
      cleanupListener = () => { ref.off(); db.ref(".info/connected").off(); };
    }

    return () => { cleanupListener(); };
  };

  // ── Write to a specific team ──────────────────────────────────────────────
  window.__fbSet = function(key, value, teamId) {
    return db.ref("teams/" + teamId + "/" + key).set(value);
  };

// ─── App version (bump minor for each PR) ────────────────────────────────────
const APP_VERSION = "v1.6";

// ─── Per-team pitch rules (updated when a team is selected) ──────────────────
const DEFAULT_RULES = { maxPitches: 55, rest1: 20, rest2: 40, rest3: 60 };
let currentRules = { ...DEFAULT_RULES };

function setCurrentRules(rules) {
  currentRules = rules && rules.maxPitches ? rules : { ...DEFAULT_RULES };
}

function getRegRestDays(pitches) {
  const r = currentRules;
  if (pitches > r.rest3) return 3;
  if (pitches > r.rest2) return 2;
  if (pitches > r.rest1) return 1;
  return 0;
}

function getEligibleDate(gameDate, pitches, restFn) {
  const days = restFn(pitches);
  if (days === 0) return null;
  const d = new Date(gameDate + "T12:00:00");
  d.setDate(d.getDate() + days + 1);
  return d;
}

// Post-tournament rest (CPYL rules):
// - First rest day = day after last pitch date in tournament
// - Total tournament pitches determine rest requirement (same thresholds as regular season)
// - ≤20 total pitches = no rest required (eligible immediately)
function getTourneyAdjustedRestInfo(pitcher, tournaments) {
  const history = pitcher.history || [];
  if (history.length > 0 && tournaments && tournaments.length > 0) {
    const sorted = [...history].sort((a,b) => a.date < b.date ? 1 : -1);
    const lastGame = sorted[0];
    if (lastGame && lastGame.isTournament && lastGame.tournamentId) {
      const tourney = tournaments.find(t => t.id === lastGame.tournamentId);
      if (tourney) {
        const tourneyGames = history.filter(h => h.tournamentId === lastGame.tournamentId);
        const totalPitches = tourneyGames.reduce((s, g) => s + g.pitches, 0);
        const lastPitchDate = lastGame.date;
        const restDays = getRegRestDays(totalPitches);
        let eligibleDate = null;
        if (restDays > 0) {
          eligibleDate = new Date(lastPitchDate + "T12:00:00");
          eligibleDate.setDate(eligibleDate.getDate() + restDays + 1);
        }
        return { isTourney:true, totalPitches, lastPitchDate, eligibleDate, restDays };
      }
    }
  }
  // Standard regular-season rest
  const eligibleDate = getEligibleDate(pitcher.lastGameDate, pitcher.lastPitches, getRegRestDays);
  return { isTourney:false, totalPitches:pitcher.lastPitches, lastPitchDate:pitcher.lastGameDate, eligibleDate };
}

function getAvailabilityStatus(pitcher, onDate, tournaments) {
  if (!pitcher.lastPitches || pitcher.lastPitches === 0) return "available";
  const info = getTourneyAdjustedRestInfo(pitcher, tournaments);
  if (!info.eligibleDate) return "available";
  const eligMid = new Date(info.eligibleDate); eligMid.setHours(0,0,0,0);
  const ref = onDate ? new Date(onDate + "T00:00:00") : new Date();
  ref.setHours(0,0,0,0);
  if (eligMid <= ref) return "available";
  const msLeft = eligMid - ref;
  const daysLeft = Math.ceil(msLeft / 86400000);
  if (daysLeft <= 1) return "tomorrow";
  const restDays = info.isTourney ? info.restDays : getRegRestDays(pitcher.lastPitches);
  if (restDays <= 1) return "soon";
  if (restDays <= 2) return "resting2";
  return "resting";
}

function daysUntilEligible(pitcher, onDate, tournaments) {
  if (!pitcher.lastGameDate || pitcher.lastPitches === 0) return 0;
  const info = getTourneyAdjustedRestInfo(pitcher, tournaments);
  if (!info.eligibleDate) return 0;
  const eligMid = new Date(info.eligibleDate); eligMid.setHours(0,0,0,0);
  const ref = onDate ? new Date(onDate + "T00:00:00") : new Date();
  ref.setHours(0,0,0,0);
  const ms = eligMid - ref;
  return Math.max(0, Math.ceil(ms / 86400000));
}

function getEligibleDateStr(pitcher, tournaments) {
  if (!pitcher.lastGameDate || !pitcher.lastPitches) return null;
  const info = getTourneyAdjustedRestInfo(pitcher, tournaments);
  return info.eligibleDate ? info.eligibleDate.toISOString() : null;
}


function formatDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso + (iso.includes("T") ? "" : "T12:00:00"));
  return d.toLocaleDateString("en-US", { month:"short", day:"numeric" });
}
function todayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function addDays(dateStr, n) {
  const d = new Date(dateStr + "T12:00:00");
  d.setDate(d.getDate() + n);
  return d.toISOString().split("T")[0];
}
function newId() { return Date.now().toString() + Math.random().toString(36).slice(2,6); }

// Rebuild lastPitches/lastGameDate from sorted history
function recomputeLast(history) {
  if (!history || history.length === 0) return { lastPitches:0, lastGameDate:null };
  const sorted = [...history].sort((a,b) => a.date < b.date ? -1 : a.date > b.date ? 1 : 0);
  const last = sorted[sorted.length - 1];
  return { lastPitches: last.pitches, lastGameDate: last.date };
}

function RadialArc({ value, max, size=120, strokeW=9, color="#38bdf8" }) {
  const r = (size - strokeW) / 2;
  const cx = size / 2, cy = size / 2;
  const circ = 2 * Math.PI * r;
  const pct = Math.min(value / max, 1);
  const arcColor = pct >= 1 ? "#f43f5e" : pct >= (max-15)/max ? "#fb923c" : color;
  return (
    <svg width={size} height={size} style={{ transform:"rotate(-90deg)" }}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={strokeW}/>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={arcColor} strokeWidth={strokeW}
        strokeDasharray={circ} strokeDashoffset={circ*(1-pct)}
        strokeLinecap="round" style={{ transition:"stroke-dashoffset 0.3s,stroke 0.3s" }}/>
    </svg>
  );
}

// ─── Context picker (reused in multiple screens) ──────────────────────────────
function ContextPicker({ context, setContext, tourneyDay, setTourneyDay, tournaments, gameDate }) {
  // Only show tournaments that are still active on the selected game date
  const activeTournaments = tournaments.filter(t => {
    if (!t.startDate) return true; // no start date set — always show
    const endDate = addDays(t.startDate, (t.days || 1) - 1);
    return (gameDate || todayStr()) <= endDate;
  });
  const selectedTourney = tournaments.find(t=>t.id===context);
  return (
    <>
      <div style={{ marginBottom:10 }}>
        <label style={{ ...sectionLabel, display:"block", marginBottom:6 }}>GAME TYPE</label>
        <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
          <button onClick={()=>setContext("regular")}
            style={{ flex:1, minWidth:80, padding:"9px 10px", borderRadius:10,
              border:`1px solid ${context==="regular"?"#2563eb":"rgba(255,255,255,0.1)"}`,
              background:context==="regular"?"rgba(37,99,235,0.2)":"rgba(255,255,255,0.04)",
              color:context==="regular"?"#60a5fa":"rgba(255,255,255,0.6)", fontSize:13, fontWeight:600, cursor:"pointer" }}>
            ⚾ Regular Season
          </button>
          {activeTournaments.map(t=>(
            <button key={t.id} onClick={()=>{setContext(t.id); if(setTourneyDay) setTourneyDay(1);}}
              style={{ flex:1, minWidth:80, padding:"9px 10px", borderRadius:10,
                border:`1px solid ${context===t.id?"#f59e0b":"rgba(255,255,255,0.1)"}`,
                background:context===t.id?"rgba(245,158,11,0.15)":"rgba(255,255,255,0.04)",
                color:context===t.id?"#fbbf24":"rgba(255,255,255,0.6)", fontSize:13, fontWeight:600, cursor:"pointer" }}>
              🏆 {t.name}
            </button>
          ))}
          {activeTournaments.length===0 && (
            <div style={{ flex:1, padding:"9px 10px", borderRadius:10, border:"1px solid rgba(255,255,255,0.06)",
              background:"rgba(255,255,255,0.02)", color:"rgba(255,255,255,0.3)", fontSize:12, textAlign:"center" }}>
              No Upcoming Tournaments
            </div>
          )}
        </div>
      </div>
      {context!=="regular" && selectedTourney && setTourneyDay && (
        <div style={{ marginBottom:10 }}>
          <label style={{ ...sectionLabel, display:"block", marginBottom:6 }}>TOURNAMENT DAY</label>
          <div style={{ display:"flex", gap:6 }}>
            {Array.from({length:selectedTourney.days},(_,i)=>i+1).map(d=>(
              <button key={d} onClick={()=>setTourneyDay(d)}
                style={{ width:42, height:42, borderRadius:10,
                  border:`1px solid ${tourneyDay===d?"#f59e0b":"rgba(255,255,255,0.1)"}`,
                  background:tourneyDay===d?"rgba(245,158,11,0.2)":"rgba(255,255,255,0.04)",
                  color:tourneyDay===d?"#fbbf24":"rgba(255,255,255,0.5)", fontSize:14, fontWeight:700, cursor:"pointer" }}>
                {d}
              </button>
            ))}
          </div>
          <div style={{ marginTop:5, fontSize:11, color:"rgba(255,255,255,0.35)" }}>
            Day 1 {selectedTourney.day1IsHardLimit?"limit":"guideline"}: {selectedTourney.maxDay1}p · <strong style={{color:"rgba(255,255,255,0.5)"}}>Tournament limit: {selectedTourney.maxTotal}p</strong>
          </div>
        </div>
      )}
    </>
  );
}

// SCREEN: ROSTER
// ══════════════════════════════════════════════════════════════════════════════
function RosterScreen({ roster, onAdd, onSelect, tournaments }) {
  const [open, setOpen] = useState(false);
  const [name, setName] = useState("");
  const [jersey, setJersey] = useState("");

  const totalPitches = p => (p.history || []).reduce((s, g) => s + (g.pitches || 0), 0);
  const sorted = [...roster].sort((a, b) => totalPitches(b) - totalPitches(a));
  const available = sorted.filter(p=>getAvailabilityStatus(p, null, tournaments)==="available").length;

  function submit() {
    if (!name.trim()) return;
    onAdd({ id:Date.now(), name:name.trim(), jersey:jersey.trim(),
      lastPitches:0, lastGameDate:null, history:[] });
    setName(""); setJersey(""); setOpen(false);
  }

  return (
    <div style={{ padding:"0 16px 110px" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"16px 0 14px" }}>
        <div>
          <h2 style={{ margin:0, fontSize:24, fontWeight:800, color:"#f8fafc", fontFamily:"'Bebas Neue',cursive", letterSpacing:2 }}>ROSTER</h2>
          <p style={{ margin:0, fontSize:12, color:"rgba(255,255,255,0.4)" }}>{available} of {roster.length} available today</p>
        </div>
        <button onClick={()=>setOpen(!open)} style={{ display:"flex", alignItems:"center", gap:6, padding:"8px 14px",
          background:"linear-gradient(135deg,#16a34a,#15803d)", border:"none", borderRadius:20,
          color:"#fff", fontSize:13, fontWeight:700, cursor:"pointer", boxShadow:"0 2px 12px rgba(22,163,74,0.35)" }}>
          {I.plus} Add
        </button>
      </div>

      {open && (
        <div style={{ ...card, border:"1px solid rgba(255,255,255,0.12)", backdropFilter:"blur(12px)" }}>
          <p style={sectionLabel}>NEW PLAYER</p>
          <input placeholder="Full name" value={name} onChange={e=>setName(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&submit()} style={{ ...inputStyle, marginBottom:8 }}/>
          <input placeholder="Jersey # (optional)" value={jersey} onChange={e=>setJersey(e.target.value.replace(/\D/g,"").slice(0,2))}
            style={{ ...inputStyle, marginBottom:10, width:100, textAlign:"center" }}/>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={()=>setOpen(false)} style={cancelBtn}>Cancel</button>
            <button onClick={submit} style={{ ...primaryBtn, flex:2 }}>Add to Roster</button>
          </div>
        </div>
      )}

      {sorted.length === 0 ? (
        <div style={{ textAlign:"center", padding:"60px 0", color:"rgba(255,255,255,0.2)" }}>
          <div style={{ fontSize:56, marginBottom:12 }}>⚾</div>
          <p style={{ fontSize:15, fontWeight:600 }}>No players yet</p>
          <p style={{ fontSize:13 }}>Tap "Add" to build your roster</p>
        </div>
      ) : sorted.map(p => {
        const status = getAvailabilityStatus(p, null, tournaments);
        const s = STATUS[status];
        const left = daysUntilEligible(p, null, tournaments);
        return (
          <div key={p.id} onClick={()=>onSelect(p)}
            style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 14px", marginBottom:8,
              background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)",
              borderLeft:`3px solid ${s.color}`, borderRadius:14, cursor:"pointer" }}>
            <div style={{ width:42, height:42, borderRadius:11, background:s.bg, border:`1px solid ${s.ring}`,
              display:"flex", alignItems:"center", justifyContent:"center",
              fontFamily:"'Bebas Neue',cursive", fontSize:16, color:s.color, flexShrink:0 }}>
              {p.jersey?`#${p.jersey}`:p.name[0].toUpperCase()}
            </div>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontWeight:700, color:"#f8fafc", fontSize:15 }}>{p.name}</div>
            </div>
            <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:3 }}>
              <Chip status={status}/>
              {left>0 && <span style={{ fontSize:11, color:"rgba(255,255,255,0.55)", fontWeight:600 }}>Eligible {formatDate(getEligibleDateStr(p, tournaments))}</span>}
              {p.lastPitches>0 && <span style={{ fontSize:11, color:"rgba(255,255,255,0.3)" }}>Last: {p.lastPitches}p on {formatDate(p.lastGameDate)}</span>}
            </div>
            <div style={{ color:"rgba(255,255,255,0.2)" }}>{I.chevron}</div>
          </div>
        );
      })}

      {roster.length>0 && (
        <div style={{ ...card, marginTop:4 }}>
          <p style={sectionLabel}>AVAILABILITY KEY</p>
          <div style={{ display:"flex", flexWrap:"wrap", gap:10 }}>
            {Object.entries(STATUS).map(([k,v])=>(
              <span key={k} style={{ display:"flex", alignItems:"center", gap:4, fontSize:11, color:"rgba(255,255,255,0.5)" }}>
                <span style={{ width:7, height:7, borderRadius:"50%", background:v.color }}/>{v.label}
              </span>
            ))}
          </div>
        </div>
      )}

      <div style={{ ...card, marginTop:4 }}>
        <p style={sectionLabel}>CPYL REST REQUIREMENTS</p>
        {[["0–20 pitches","No rest","#4ade80"],["21–40 pitches","1 day","#a3e635"],["41–60 pitches","2 days","#fb923c"],["61+ pitches","3 days","#f43f5e"]].map(([r,rest,c],i)=>(
          <div key={i} style={{ display:"flex", justifyContent:"space-between", padding:"7px 0",
            borderBottom:i<3?"1px solid rgba(255,255,255,0.05)":"none", fontSize:13 }}>
            <span style={{ color:"rgba(255,255,255,0.6)", fontFamily:"'DM Mono',monospace" }}>{r}</span>
            <span style={{ color:c, fontWeight:600 }}>{rest}</span>
          </div>
        ))}
        <p style={{ margin:"8px 0 0", fontSize:11, color:"rgba(255,255,255,0.3)", display:"flex", alignItems:"center", gap:5 }}>
          {I.warning} Max 55 — may finish batter already in progress
        </p>
      </div>
    </div>
  );
}

// MODAL: EDIT SINGLE GAME ENTRY
// ══════════════════════════════════════════════════════════════════════════════
function EditGameModal({ entry, pitcherName, roster, tournaments, onSave, onDelete, onClose }) {
  const [pitches, setPitches] = useState(entry.pitches);
  const [date, setDate] = useState(entry.date);
  const [opponent, setOpponent] = useState(entry.opponent || "");
  const [context, setContext] = useState(entry.isTournament ? (entry.tournamentId || "regular") : "regular");
  const [tourneyDay, setTourneyDay] = useState(entry.tourneyDay || 1);
  const [confirmDelete, setConfirmDelete] = useState(false);

  const selectedTourney = tournaments.find(t=>t.id===context);

  function handleSave() {
    if (pitches < 1) return;
    onSave({
      ...entry,
      pitches,
      date,
      opponent,
      isTournament: context !== "regular",
      tournamentId: context !== "regular" ? context : null,
      tournamentName: context !== "regular" ? selectedTourney?.name : null,
      tourneyDay: context !== "regular" ? tourneyDay : null,
    });
  }

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", zIndex:50,
      display:"flex", alignItems:"flex-end", justifyContent:"center" }}
      onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div style={{ width:"100%", maxWidth:430, background:"#0f1623",
        border:"1px solid rgba(255,255,255,0.12)", borderRadius:"20px 20px 0 0",
        padding:"20px 18px 40px", maxHeight:"92vh", overflowY:"auto" }}>

        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
          <div>
            <div style={{ fontSize:16, fontWeight:800, color:"#f8fafc" }}>Edit Game Entry</div>
            <div style={{ fontSize:12, color:"rgba(255,255,255,0.4)", marginTop:2 }}>{pitcherName}</div>
          </div>
          <button onClick={onClose} style={{ background:"rgba(255,255,255,0.07)", border:"none", borderRadius:8,
            width:32, height:32, color:"rgba(255,255,255,0.6)", cursor:"pointer", fontSize:18 }}>✕</button>
        </div>

        {/* Pitch count */}
        <label style={{ ...sectionLabel, display:"block", marginBottom:6 }}>PITCH COUNT</label>
        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14 }}>
          <button onClick={()=>setPitches(p=>Math.max(0,p-1))}
            style={{ width:44, height:44, borderRadius:"50%", background:"rgba(255,255,255,0.07)",
              border:"1px solid rgba(255,255,255,0.12)", color:"#f8fafc", fontSize:18, fontWeight:700, cursor:"pointer" }}>−</button>
          <input type="number" min="0" value={pitches===0?"":String(pitches)}
            onChange={e=>{ const v=parseInt(e.target.value,10); setPitches(isNaN(v)||v<0?0:v); }}
            style={{ ...inputStyle, flex:1, textAlign:"center", fontSize:28, fontWeight:900,
              fontFamily:"'Bebas Neue',cursive", height:52, padding:"4px 8px" }}/>
          <button onClick={()=>setPitches(p=>p+1)}
            style={{ width:44, height:44, borderRadius:"50%",
              background:"linear-gradient(135deg,#2563eb,#1d4ed8)", border:"none",
              color:"#fff", fontSize:18, fontWeight:700, cursor:"pointer",
              boxShadow:"0 2px 10px rgba(37,99,235,0.4)" }}>+</button>
        </div>
        <div style={{ display:"flex", gap:6, marginBottom:14 }}>
          {[-5,-1,1,5].map(d=>(
            <button key={d} onClick={()=>setPitches(p=>Math.max(0,p+d))}
              style={{ flex:1, padding:"7px 0", borderRadius:8,
                background: d>0 ? "rgba(37,99,235,0.15)" : "rgba(255,255,255,0.05)",
                border:`1px solid ${d>0?"rgba(37,99,235,0.3)":"rgba(255,255,255,0.1)"}`,
                color: d>0 ? "#60a5fa" : "rgba(255,255,255,0.6)", fontSize:12, fontWeight:700, cursor:"pointer" }}>
              {d>0?`+${d}`:d}
            </button>
          ))}
        </div>

        {/* Rest preview */}
        {pitches > 0 && (
          <div style={{ marginBottom:14, padding:"8px 12px", background:"rgba(255,255,255,0.03)",
            border:"1px solid rgba(255,255,255,0.07)", borderRadius:10,
            display:"flex", gap:16, justifyContent:"center" }}>
            {(() => {
              const rd = getRegRestDays(pitches);
              const eligDate = date ? getEligibleDate(date, pitches, getRegRestDays) : null;
              return (
                <>
                  <div style={{ textAlign:"center" }}>
                    <div style={{ fontSize:18, fontWeight:800, fontFamily:"'Bebas Neue',cursive",
                      color: rd===0?"#4ade80":rd===1?"#a3e635":rd===2?"#fb923c":"#f43f5e" }}>
                      {rd===0?"NONE":`${rd} DAY${rd!==1?"S":""}`}
                    </div>
                    <div style={{ fontSize:9, color:"rgba(255,255,255,0.35)" }}>REST REQ.</div>
                  </div>
                  {eligDate && (
                    <div style={{ textAlign:"center" }}>
                      <div style={{ fontSize:18, fontWeight:800, fontFamily:"'Bebas Neue',cursive", color:"rgba(255,255,255,0.7)" }}>
                        {formatDate(eligDate.toISOString())}
                      </div>
                      <div style={{ fontSize:9, color:"rgba(255,255,255,0.35)" }}>ELIGIBLE</div>
                    </div>
                  )}
                </>
              );
            })()}
          </div>
        )}

        {/* Game type */}
        <ContextPicker context={context} setContext={setContext}
          tourneyDay={tourneyDay} setTourneyDay={setTourneyDay} tournaments={tournaments} gameDate={gameDate}/>

        {/* Date */}
        <label style={{ ...sectionLabel, display:"block", marginBottom:4 }}>GAME DATE</label>
        <input type="date" value={date} onChange={e=>setDate(e.target.value)}
          style={{ ...inputStyle, marginBottom:10 }}/>

        {/* Opponent */}
        <label style={{ ...sectionLabel, display:"block", marginBottom:4 }}>OPPONENT</label>
        <input placeholder="Team name (optional)" value={opponent} onChange={e=>setOpponent(e.target.value)}
          style={{ ...inputStyle, marginBottom:16 }}/>

        {/* Actions */}
        <div style={{ display:"flex", gap:8, marginBottom:10 }}>
          <button onClick={onClose} style={{ ...cancelBtn, flex:1 }}>Cancel</button>
          <button onClick={handleSave} disabled={pitches<1}
            style={{ ...primaryBtn, flex:2, opacity:pitches<1?0.4:1 }}>
            {I.check} Save Changes
          </button>
        </div>

        {/* Delete */}
        {!confirmDelete ? (
          <button onClick={()=>setConfirmDelete(true)}
            style={{ width:"100%", background:"transparent", border:"1px solid rgba(244,63,94,0.2)",
              borderRadius:12, padding:"10px", color:"rgba(244,63,94,0.6)", fontSize:13, cursor:"pointer",
              display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>
            {I.trash} Delete this game entry
          </button>
        ) : (
          <div style={{ background:"rgba(244,63,94,0.08)", border:"1px solid rgba(244,63,94,0.25)",
            borderRadius:12, padding:12 }}>
            <p style={{ margin:"0 0 10px", fontSize:13, color:"#f87171", fontWeight:600 }}>
              Delete this game entry for {pitcherName}?
            </p>
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={()=>setConfirmDelete(false)} style={{ ...cancelBtn, flex:1 }}>Keep it</button>
              <button onClick={onDelete}
                style={{ flex:2, background:"linear-gradient(135deg,#dc2626,#b91c1c)", border:"none",
                  borderRadius:12, padding:10, color:"#fff", fontSize:13, fontWeight:700, cursor:"pointer" }}>
                Yes, Delete
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// SCREEN: PITCHER DETAIL
// ══════════════════════════════════════════════════════════════════════════════
function PitcherDetail({ pitcher, onBack, onLog, onDelete, tournaments, onEditGame, onDeleteGame, onEditPlayer }) {
  const [logOpen, setLogOpen] = useState(false);
  const [pitches, setPitches] = useState(0);
  const [gameDate, setGameDate] = useState(todayStr());
  const [context, setContext] = useState("regular");
  const [tourneyDay, setTourneyDay] = useState(1);
  const [opponent, setOpponent] = useState("");
  const [saved, setSaved] = useState(false);
  const [editingEntry, setEditingEntry] = useState(null);
  const [editOpen, setEditOpen] = useState(false);
  const [editName, setEditName] = useState(pitcher.name);
  const [editJersey, setEditJersey] = useState(pitcher.jersey||"");
  const [confirmRemove, setConfirmRemove] = useState(false);

  const status = getAvailabilityStatus(pitcher, null, tournaments);
  const s = STATUS[status];
  const restInfo = getTourneyAdjustedRestInfo(pitcher, tournaments);
  const eligible = restInfo.eligibleDate;
  const daysLeft = daysUntilEligible(pitcher, null, tournaments);
  const restRemaining = restInfo.isTourney
    ? daysLeft
    : daysLeft - (pitcher.lastGameDate === todayStr() ? 1 : 0);
  const selectedTourney = tournaments.find(t=>t.id===context);
  const seasons = [...new Set((pitcher.history||[]).map(h=>h.date.slice(0,4)))].sort().reverse();

  function handleLog() {
    if (pitches < 1) return;
    onLog(pitcher.id, {
      pitches, date:gameDate, opponent,
      isTournament: context!=="regular",
      tournamentId: context!=="regular" ? context : null,
      tournamentName: context!=="regular" ? selectedTourney?.name : null,
      tourneyDay: context!=="regular" ? tourneyDay : null,
    });
    setSaved(true);
    setTimeout(()=>{ setSaved(false); setLogOpen(false); setPitches(0); setOpponent(""); }, 1800);
  }

  const seasonStats = seasons.map(yr => {
    const games = (pitcher.history||[]).filter(h=>h.date.startsWith(yr));
    return { yr, games:games.length, total:games.reduce((s,g)=>s+g.pitches,0),
      avg:games.length?Math.round(games.reduce((s,g)=>s+g.pitches,0)/games.length):0,
      high:games.reduce((m,g)=>Math.max(m,g.pitches),0) };
  });

  return (
    <div style={{ padding:"0 16px 110px" }}>
      {editingEntry && (
        <EditGameModal
          entry={editingEntry}
          pitcherName={pitcher.name}
          roster={[pitcher]}
          tournaments={tournaments}
          onSave={updated=>{ onEditGame(pitcher.id, updated.gameId, updated); setEditingEntry(null); }}
          onDelete={()=>{ onDeleteGame(pitcher.id, editingEntry.gameId); setEditingEntry(null); }}
          onClose={()=>setEditingEntry(null)}/>
      )}

      <div style={{ display:"flex", alignItems:"center", gap:10, padding:"14px 0 16px" }}>
        <button onClick={onBack} style={{ background:"rgba(255,255,255,0.07)", border:"none", borderRadius:10,
          padding:10, color:"rgba(255,255,255,0.7)", cursor:"pointer", display:"flex" }}>{I.back}</button>
        <div style={{ flex:1 }}>
          <h2 style={{ margin:0, fontSize:22, fontWeight:800, color:"#f8fafc", fontFamily:"'Bebas Neue',cursive", letterSpacing:1.5 }}>
            {pitcher.jersey?`#${pitcher.jersey} · `:""}{pitcher.name.toUpperCase()}
          </h2>
        </div>
        <button onClick={()=>{ setEditName(pitcher.name); setEditJersey(pitcher.jersey||""); setEditOpen(o=>!o); }}
          style={{ background:editOpen?"rgba(56,189,248,0.15)":"rgba(255,255,255,0.07)",
            border:`1px solid ${editOpen?"rgba(56,189,248,0.4)":"rgba(255,255,255,0.1)"}`,
            borderRadius:10, padding:10, color:editOpen?"#38bdf8":"rgba(255,255,255,0.5)",
            cursor:"pointer", display:"flex" }}>{I.edit}</button>
        <Chip status={status} size="lg"/>
      </div>

      {/* Edit player details */}
      {editOpen && (
        <div style={{ ...card, border:"1px solid rgba(56,189,248,0.25)", marginBottom:12 }}>
          <p style={sectionLabel}>EDIT PLAYER</p>
          <label style={{ ...sectionLabel, display:"block", marginBottom:4 }}>NAME</label>
          <input value={editName} onChange={e=>setEditName(e.target.value)}
            style={{ ...inputStyle, marginBottom:10 }}/>
          <label style={{ ...sectionLabel, display:"block", marginBottom:4 }}>JERSEY #</label>
          <input placeholder="Optional" value={editJersey}
            onChange={e=>setEditJersey(e.target.value.replace(/\D/g,"").slice(0,2))}
            style={{ ...inputStyle, width:100, textAlign:"center", marginBottom:12 }}/>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={()=>setEditOpen(false)} style={cancelBtn}>Cancel</button>
            <button onClick={()=>{
              if (!editName.trim()) return;
              onEditPlayer(pitcher.id, { name:editName.trim(), jersey:editJersey.trim() });
              setEditOpen(false);
            }} style={{ ...primaryBtn, flex:2 }}>
              {I.check} Save Changes
            </button>
          </div>
        </div>
      )}

      {/* Status hero */}
      <div style={{ background:`radial-gradient(circle at 30% 40%,${s.bg},rgba(0,0,0,0.2))`,
        border:`1px solid ${s.ring}`, borderRadius:20, padding:20, marginBottom:12,
        display:"flex", alignItems:"center", gap:16 }}>
        <div style={{ position:"relative", flexShrink:0 }}>
          <RadialArc value={pitcher.lastPitches} max={currentRules.maxPitches} size={100} strokeW={8} color={s.color}/>
          <div style={{ position:"absolute", top:"50%", left:"50%", transform:"translate(-50%,-50%)", textAlign:"center" }}>
            <div style={{ fontSize:26, fontWeight:900, color:"#f8fafc", fontFamily:"'Bebas Neue',cursive", lineHeight:1 }}>{pitcher.lastPitches}</div>
            <div style={{ fontSize:10, color:"rgba(255,255,255,0.4)" }}>/{currentRules.maxPitches}</div>
          </div>
        </div>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:15, fontWeight:700, color:s.color, marginBottom:3 }}>
            {status==="available" ? "✅ Available to pitch" : `⏳ ${restRemaining} day${restRemaining!==1?"s":""} rest remaining`}
          </div>
          {eligible && <div style={{ fontSize:13, color:"rgba(255,255,255,0.5)" }}>
            Eligible: <strong style={{ color:"rgba(255,255,255,0.85)" }}>{formatDate(eligible.toISOString())}</strong>
          </div>}
          {pitcher.lastGameDate && <div style={{ fontSize:12, color:"rgba(255,255,255,0.35)", marginTop:2 }}>
            Last: {formatDate(pitcher.lastGameDate)} · {pitcher.lastPitches}p
          </div>}
        </div>
      </div>

      {/* Log new pitches */}
      {saved ? (
        <div style={{ padding:20, textAlign:"center", background:"rgba(74,222,128,0.08)",
          border:"1px solid rgba(74,222,128,0.25)", borderRadius:16, marginBottom:12 }}>
          <div style={{ fontSize:32 }}>✅</div>
          <div style={{ color:"#4ade80", fontWeight:700, marginTop:6 }}>Pitches logged!</div>
        </div>
      ) : !logOpen ? (
        <button onClick={()=>setLogOpen(true)} style={{ ...primaryBtn, width:"100%", marginBottom:12, padding:14 }}>
          + Log Game Pitches
        </button>
      ) : (
        <div style={{ ...card, border:"1px solid rgba(255,255,255,0.12)" }}>
          <p style={sectionLabel}>LOG PITCHES</p>
          <PitcherStatusBanner pitcher={pitcher} tournaments={tournaments}/>
          <ContextPicker context={context} setContext={setContext}
            tourneyDay={tourneyDay} setTourneyDay={setTourneyDay} tournaments={tournaments} gameDate={gameDate}/>
          <div style={{ textAlign:"center", marginBottom:12 }}>
            <div style={{ position:"relative", display:"inline-block" }}>
              <RadialArc value={pitches} max={currentRules.maxPitches} size={120} strokeW={9} color="#38bdf8"/>
              <div style={{ position:"absolute", top:"50%", left:"50%", transform:"translate(-50%,-50%)", textAlign:"center" }}>
                <div style={{ fontSize:36, fontWeight:900, lineHeight:1, fontFamily:"'Bebas Neue',cursive",
                  color:pitches>currentRules.maxPitches?"#f43f5e":"#f8fafc" }}>{pitches}</div>
                <div style={{ fontSize:10, color:"rgba(255,255,255,0.35)" }}>pitches</div>
              </div>
            </div>
          </div>
          <div style={{ display:"flex", justifyContent:"center", gap:8, marginBottom:10 }}>
            {[-5,-1].map(d=>(
              <button key={d} onClick={()=>setPitches(p=>Math.max(0,p+d))}
                style={{ width:50, height:50, borderRadius:"50%", background:"rgba(255,255,255,0.07)",
                  border:"1px solid rgba(255,255,255,0.12)", color:"rgba(255,255,255,0.8)", fontSize:14, fontWeight:700, cursor:"pointer" }}>{d}</button>
            ))}
            {[1,5].map(d=>(
              <button key={d} onClick={()=>setPitches(p=>p+d)}
                style={{ width:50, height:50, borderRadius:"50%",
                  background:"linear-gradient(135deg,#2563eb,#1d4ed8)", border:"none", color:"#fff", fontSize:14, fontWeight:800, cursor:"pointer",
                  boxShadow:"0 3px 12px rgba(37,99,235,0.4)" }}>+{d}</button>
            ))}
          </div>
          <input type="number" min="0" placeholder="Or type exact count…"
            value={pitches===0?"":String(pitches)}
            onChange={e=>{ const v=parseInt(e.target.value,10); setPitches(isNaN(v)||v<0?0:v); }}
            style={{ ...inputStyle, fontSize:18, fontWeight:800, fontFamily:"'Bebas Neue',cursive", textAlign:"center", marginBottom:10 }}/>
          <input placeholder="Opponent (optional)" value={opponent} onChange={e=>setOpponent(e.target.value)}
            style={{ ...inputStyle, marginBottom:10 }}/>
          <label style={{ ...sectionLabel, display:"block", marginBottom:4 }}>GAME DATE</label>
          <input type="date" value={gameDate} onChange={e=>setGameDate(e.target.value)}
            style={{ ...inputStyle, marginBottom:12 }}/>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={()=>{setLogOpen(false);setPitches(0);}} style={cancelBtn}>Cancel</button>
            <button onClick={handleLog} disabled={pitches<1}
              style={{ ...primaryBtn, flex:2, opacity:pitches<1?0.4:1 }}>Save {pitches>0?`${pitches}p`:""}</button>
          </div>
        </div>
      )}

      {/* Season Stats */}
      {seasonStats.filter(s=>s.games>0).length > 0 && (
        <div style={card}>
          <p style={sectionLabel}>SEASON STATS</p>
          {seasonStats.map(st=>(
            <div key={st.yr} style={{ marginBottom:10 }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
                <span style={{ fontSize:14, fontWeight:700, color:"rgba(255,255,255,0.8)" }}>{st.yr}</span>
                <span style={{ fontSize:12, color:"rgba(255,255,255,0.4)" }}>{st.games} games</span>
              </div>
              <div style={{ display:"flex", gap:6 }}>
                {[["Total",`${st.total}p`],["Avg",`${st.avg}p`],["High",`${st.high}p`]].map(([l,v])=>(
                  <div key={l} style={{ flex:1, textAlign:"center", padding:"8px 4px", background:"rgba(255,255,255,0.04)", borderRadius:10 }}>
                    <div style={{ fontSize:16, fontWeight:800, color:"#38bdf8", fontFamily:"'Bebas Neue',cursive" }}>{v}</div>
                    <div style={{ fontSize:10, color:"rgba(255,255,255,0.35)" }}>{l}</div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* History — editable */}
      {pitcher.history?.length > 0 && (
        <div style={card}>
          <p style={sectionLabel}>GAME HISTORY — TAP TO EDIT</p>
          {[...pitcher.history].sort((a,b)=>b.date<a.date?-1:1).map((h,i)=>{
            const rd = getRegRestDays(h.pitches);
            return (
              <div key={h.gameId||i} onClick={()=>setEditingEntry(h)}
                style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
                  padding:"10px 10px", borderRadius:10, marginBottom:4, cursor:"pointer",
                  background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.05)",
                  transition:"background 0.15s" }}
                onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.05)"}
                onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,0.02)"}>
                <div>
                  <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                    <span style={{ fontSize:14, fontWeight:700, color:"#f8fafc" }}>{h.pitches}p</span>
                    {h.isTournament && <span style={{ fontSize:9, padding:"2px 6px", background:"rgba(245,158,11,0.15)",
                      border:"1px solid rgba(245,158,11,0.3)", borderRadius:6, color:"#f59e0b", fontWeight:700 }}>
                      {h.tournamentName||"TOURNEY"}{h.tourneyDay?` D${h.tourneyDay}`:""}
                    </span>}
                  </div>
                  <div style={{ fontSize:12, color:"rgba(255,255,255,0.35)" }}>
                    {formatDate(h.date)}{h.opponent?` · vs ${h.opponent}`:""}
                  </div>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <span style={{ fontSize:12, fontWeight:600, color:rd===0?"#4ade80":rd<=1?"#a3e635":rd<=2?"#fb923c":"#f43f5e" }}>
                    {rd===0?"No rest":`${rd}d rest`}
                  </span>
                  <div style={{ color:"rgba(255,255,255,0.3)", flexShrink:0 }}>{I.edit}</div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {!confirmRemove ? (
        <button onClick={()=>setConfirmRemove(true)} style={{ width:"100%", background:"transparent",
          border:"1px solid rgba(244,63,94,0.2)", borderRadius:14, padding:12, color:"rgba(244,63,94,0.6)",
          fontSize:14, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>
          {I.trash} Remove from Roster
        </button>
      ) : (
        <div style={{ background:"rgba(244,63,94,0.08)", border:"1px solid rgba(244,63,94,0.25)",
          borderRadius:14, padding:14 }}>
          <p style={{ margin:"0 0 10px", fontSize:13, color:"#f87171", fontWeight:600, textAlign:"center" }}>
            Remove {pitcher.name} from the roster? This will delete all their pitch history.
          </p>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={()=>setConfirmRemove(false)} style={{ ...cancelBtn, flex:1 }}>Keep Player</button>
            <button onClick={()=>onDelete(pitcher.id)}
              style={{ flex:2, background:"linear-gradient(135deg,#dc2626,#b91c1c)", border:"none",
                borderRadius:12, padding:10, color:"#fff", fontSize:13, fontWeight:700, cursor:"pointer" }}>
              Yes, Remove
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// SCREEN: GAME LOG — enter entire game at once, with edit mode
// ══════════════════════════════════════════════════════════════════════════════
function GameLogScreen({ roster, onLogMultiple, tournaments, onEditGame, onDeleteGame }) {
  const [mode, setMode] = useState("new"); // "new" | "edit"
  const [gameDate, setGameDate] = useState(todayStr());
  const [context, setContext] = useState("regular");
  const [tourneyDay, setTourneyDay] = useState(1);
  const [opponent, setOpponent] = useState("");
  const [entries, setEntries] = useState({});
  const [saved, setSaved] = useState(false);
  const [editingEntry, setEditingEntry] = useState(null); // { pitcher, entry }
  const [editPitcher, setEditPitcher] = useState(null);

  const selectedTourney = tournaments.find(t=>t.id===context);

  function setEntry(id, val) { setEntries(e=>({...e,[id]:val})); }
  function getCount(id) { const v=parseInt(entries[id]||"0",10); return isNaN(v)||v<0?0:v; }

  const pitcherLimit = currentRules.maxPitches;

  function handleSave() {
    const toLog = roster.filter(p=>getCount(p.id)>0);
    if (toLog.length===0) return;
    // Use a shared gameId so all entries from this game are linked
    const sharedGameId = newId();
    toLog.forEach(p=>{
      onLogMultiple(p.id, {
        pitches: getCount(p.id),
        date: gameDate,
        opponent,
        isTournament: context!=="regular",
        tournamentId: context!=="regular"?context:null,
        tournamentName: context!=="regular"?selectedTourney?.name:null,
        tourneyDay: context!=="regular"?tourneyDay:null,
        gameId: sharedGameId + "_" + p.id,
      });
    });
    setSaved(true);
    setTimeout(()=>{ setSaved(false); setEntries({}); setOpponent(""); }, 2200);
  }

  const hasEntries = roster.some(p=>getCount(p.id)>0);
  const totalPitchers = roster.filter(p=>getCount(p.id)>0).length;

  // Gather all historical games with their pitchers for the edit tab
  const allGameDates = [...new Set(
    roster.flatMap(p=>(p.history||[]).map(h=>h.date))
  )].sort().reverse();

  // Group history entries by date+opponent
  const gameGroups = allGameDates.slice(0,50).map(date=>{
    const pitchers = roster.flatMap(p=>
      (p.history||[]).filter(h=>h.date===date).map(h=>({...h, pitcherName:p.name, pitcherId:p.id, jersey:p.jersey}))
    );
    const opponent = pitchers[0]?.opponent || "";
    const isTournament = pitchers[0]?.isTournament || false;
    const tournamentName = pitchers[0]?.tournamentName || "";
    const tourneyDay = pitchers[0]?.tourneyDay;
    return { date, opponent, pitchers, isTournament, tournamentName, tourneyDay };
  }).filter(g=>g.pitchers.length>0);

  return (
    <div style={{ padding:"0 16px 110px" }}>
      {editingEntry && (
        <EditGameModal
          entry={editingEntry.entry}
          pitcherName={editingEntry.pitcher.pitcherName||editingEntry.pitcher.name}
          roster={roster}
          tournaments={tournaments}
          onSave={updated=>{ onEditGame(editingEntry.pitcher.pitcherId||editingEntry.pitcher.id, updated.gameId, updated); setEditingEntry(null); }}
          onDelete={()=>{ onDeleteGame(editingEntry.pitcher.pitcherId||editingEntry.pitcher.id, editingEntry.entry.gameId); setEditingEntry(null); }}
          onClose={()=>setEditingEntry(null)}/>
      )}

      <div style={{ padding:"16px 0 14px" }}>
        <h2 style={{ margin:0, fontSize:24, fontWeight:800, color:"#f8fafc", fontFamily:"'Bebas Neue',cursive", letterSpacing:2 }}>GAME LOG</h2>
        <p style={{ margin:0, fontSize:12, color:"rgba(255,255,255,0.4)" }}>Record or edit pitch counts for any game</p>
      </div>

      {/* Mode toggle */}
      <div style={{ display:"flex", gap:8, marginBottom:14 }}>
        {[["new","+ New Game"],["edit","✏ Edit Past Games"]].map(([m,label])=>(
          <button key={m} onClick={()=>setMode(m)}
            style={{ flex:1, padding:"10px", borderRadius:12,
              border:`1px solid ${mode===m?"#38bdf8":"rgba(255,255,255,0.1)"}`,
              background:mode===m?"rgba(56,189,248,0.15)":"rgba(255,255,255,0.04)",
              color:mode===m?"#38bdf8":"rgba(255,255,255,0.5)", fontSize:13, fontWeight:700, cursor:"pointer" }}>
            {label}
          </button>
        ))}
      </div>

      {/* ── NEW GAME MODE ── */}
      {mode==="new" && (
        saved ? (
          <div style={{ textAlign:"center", padding:"50px 20px", background:"rgba(74,222,128,0.07)",
            border:"1px solid rgba(74,222,128,0.25)", borderRadius:20, marginBottom:16 }}>
            <div style={{ fontSize:48, marginBottom:8 }}>✅</div>
            <div style={{ color:"#4ade80", fontSize:18, fontWeight:700 }}>Game Saved!</div>
            <div style={{ color:"rgba(255,255,255,0.4)", fontSize:13, marginTop:4 }}>{totalPitchers} pitcher{totalPitchers!==1?"s":""} logged</div>
          </div>
        ) : (
          <>
            <div style={card}>
              <p style={sectionLabel}>GAME DETAILS</p>
              <ContextPicker context={context} setContext={setContext}
                tourneyDay={tourneyDay} setTourneyDay={setTourneyDay} tournaments={tournaments} gameDate={gameDate}/>
              <label style={{ ...sectionLabel, display:"block", marginBottom:4 }}>GAME DATE</label>
              <input type="date" value={gameDate} onChange={e=>setGameDate(e.target.value)}
                style={{ ...inputStyle, marginBottom:10 }}/>
              <label style={{ ...sectionLabel, display:"block", marginBottom:4 }}>OPPONENT</label>
              <input placeholder="Team name" value={opponent} onChange={e=>setOpponent(e.target.value)} style={inputStyle}/>
            </div>

            <div style={card}>
              <p style={sectionLabel}>PITCHER PITCH COUNTS</p>
              <p style={{ margin:"0 0 12px", fontSize:12, color:"rgba(255,255,255,0.4)" }}>Leave blank if pitcher did not appear.</p>
              {roster.length===0 ? (
                <div style={{ textAlign:"center", padding:"20px 0", color:"rgba(255,255,255,0.3)", fontSize:13 }}>No players on roster yet</div>
              ) : [...roster].sort((a,b)=>((b.history||[]).reduce((s,g)=>s+(g.pitches||0),0))-((a.history||[]).reduce((s,g)=>s+(g.pitches||0),0))).map(p=>{
                const status = getAvailabilityStatus(p, null, tournaments);
                const s = STATUS[status];
                const count = getCount(p.id);
                const overLimit = count > pitcherLimit;
                const atWarning = context==="regular" && count >= pitcherLimit-10 && count <= pitcherLimit;
                return (
                  <div key={p.id} style={{ marginBottom:10, padding:12, borderRadius:12,
                    background:status!=="available"?s.bg:"rgba(255,255,255,0.02)",
                    border:`1px solid ${status!=="available"?s.ring:"rgba(255,255,255,0.07)"}` }}>
                    <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8 }}>
                      <div style={{ width:38, height:38, borderRadius:10, background:s.bg, border:`1px solid ${s.ring}`,
                        display:"flex", alignItems:"center", justifyContent:"center",
                        fontFamily:"'Bebas Neue',cursive", fontSize:15, color:s.color, flexShrink:0 }}>
                        {p.jersey?`#${p.jersey}`:p.name[0]}
                      </div>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:14, fontWeight:700, color:"#f8fafc" }}>{p.name}</div>
                        <div style={{ fontSize:11, color:"rgba(255,255,255,0.4)" }}>
                          {p.lastPitches>0?`Last: ${p.lastPitches}p on ${formatDate(p.lastGameDate)}`:"No recent games"}
                        </div>
                      </div>
                      <Chip status={status}/>
                    </div>
                    {status!=="available" && (
                      <div style={{ display:"flex", alignItems:"center", gap:6, padding:"5px 10px",
                        background:"rgba(0,0,0,0.3)", borderRadius:8, marginBottom:8,
                        color:s.color, fontSize:12, fontWeight:600 }}>
                        {I.warning}
                        {`Eligible ${formatDate(getEligibleDateStr(p, tournaments))}`}
                      </div>
                    )}
                    <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                      {[-5,-1].map(d=>(
                        <button key={d} onClick={()=>setEntry(p.id,String(Math.max(0,getCount(p.id)+d)))}
                          style={{ width:36, height:36, borderRadius:"50%", background:"rgba(255,255,255,0.07)",
                            border:"1px solid rgba(255,255,255,0.12)", color:"rgba(255,255,255,0.8)",
                            fontSize:12, fontWeight:700, cursor:"pointer", flexShrink:0 }}>{d}</button>
                      ))}
                      <input type="number" min="0" placeholder="0"
                        value={entries[p.id]||""}
                        onChange={e=>setEntry(p.id,e.target.value)}
                        style={{ ...inputStyle, flex:1, textAlign:"center", fontSize:20, fontWeight:800,
                          fontFamily:"'Bebas Neue',cursive",
                          borderColor:overLimit?"rgba(244,63,94,0.5)":atWarning?"rgba(251,146,60,0.5)":"rgba(255,255,255,0.1)",
                          background:overLimit?"rgba(244,63,94,0.1)":atWarning?"rgba(251,146,60,0.08)":"rgba(255,255,255,0.05)" }}/>
                      {[1,5].map(d=>(
                        <button key={d} onClick={()=>setEntry(p.id,String(getCount(p.id)+d))}
                          style={{ width:36, height:36, borderRadius:"50%",
                            background:"linear-gradient(135deg,#2563eb,#1d4ed8)", border:"none",
                            color:"#fff", fontSize:12, fontWeight:800, cursor:"pointer",
                            boxShadow:"0 2px 8px rgba(37,99,235,0.35)", flexShrink:0 }}>+{d}</button>
                      ))}
                      <div style={{ textAlign:"right", minWidth:64 }}>
                        {count>0 && (
                          <>
                            <div style={{ fontSize:11, color:overLimit?(context==="regular"?"#f43f5e":"#fb923c"):atWarning?"#fb923c":"rgba(255,255,255,0.4)" }}>
                              {overLimit?(context==="regular"?`${count-pitcherLimit} over`:`${count-pitcherLimit} over guide`):`${pitcherLimit-count} left`}
                            </div>
                            <div style={{ fontSize:11, fontWeight:600,
                              color:getRegRestDays(count)===0?"#4ade80":getRegRestDays(count)===1?"#a3e635":getRegRestDays(count)===2?"#fb923c":"#f43f5e" }}>
                              {getRegRestDays(count)===0?"No rest":`${getRegRestDays(count)}d rest`}
                            </div>
                          </>
                        )}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>

            <button onClick={handleSave} disabled={!hasEntries}
              style={{ ...primaryBtn, width:"100%", padding:14, opacity:hasEntries?1:0.4,
                background:hasEntries?"linear-gradient(135deg,#16a34a,#15803d)":undefined,
                boxShadow:hasEntries?"0 4px 20px rgba(22,163,74,0.4)":undefined }}>
              {I.check} Save Game — {totalPitchers} pitcher{totalPitchers!==1?"s":""}
            </button>
          </>
        )
      )}

      {/* ── EDIT PAST GAMES MODE ── */}
      {mode==="edit" && (
        gameGroups.length===0 ? (
          <div style={{ textAlign:"center", padding:"40px 0", color:"rgba(255,255,255,0.3)" }}>
            <div style={{ fontSize:40, marginBottom:12 }}>📋</div>
            <p style={{ fontSize:14 }}>No games logged yet</p>
          </div>
        ) : gameGroups.map((g,gi)=>(
          <div key={g.date+"_"+gi} style={card}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
              <div>
                <div style={{ fontSize:14, fontWeight:700, color:"#f8fafc" }}>
                  {formatDate(g.date)}
                  {g.opponent && <span style={{ fontWeight:400, color:"rgba(255,255,255,0.5)" }}> · vs {g.opponent}</span>}
                </div>
                {g.isTournament && (
                  <span style={{ fontSize:10, padding:"2px 7px", background:"rgba(245,158,11,0.15)",
                    border:"1px solid rgba(245,158,11,0.3)", borderRadius:6, color:"#f59e0b", fontWeight:700 }}>
                    🏆 {g.tournamentName||"TOURNAMENT"}{g.tourneyDay?` · DAY ${g.tourneyDay}`:""}
                  </span>
                )}
              </div>
              <div style={{ fontSize:13, color:"rgba(255,255,255,0.4)" }}>
                {g.pitchers.reduce((s,p)=>s+p.pitches,0)}p total
              </div>
            </div>
            {g.pitchers.map((p,pi)=>{
              const rd = getRegRestDays(p.pitches);
              return (
                <div key={p.gameId||pi} onClick={()=>setEditingEntry({ pitcher:p, entry:p })}
                  style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
                    padding:"9px 10px", borderRadius:9, marginBottom:4, cursor:"pointer",
                    background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.05)" }}
                  onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.05)"}
                  onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,0.02)"}>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <div style={{ width:30, height:30, borderRadius:8,
                      background:"rgba(56,189,248,0.1)", border:"1px solid rgba(56,189,248,0.2)",
                      display:"flex", alignItems:"center", justifyContent:"center",
                      fontFamily:"'Bebas Neue',cursive", fontSize:12, color:"#38bdf8", flexShrink:0 }}>
                      {p.jersey?`#${p.jersey}`:p.pitcherName[0]}
                    </div>
                    <span style={{ fontSize:13, fontWeight:600, color:"rgba(255,255,255,0.85)" }}>{p.pitcherName}</span>
                  </div>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <span style={{ fontSize:15, fontWeight:800, color:"#f8fafc", fontFamily:"'Bebas Neue',cursive" }}>{p.pitches}p</span>
                    <span style={{ fontSize:11, fontWeight:600, color:rd===0?"#4ade80":rd<=1?"#a3e635":rd<=2?"#fb923c":"#f43f5e" }}>
                      {rd===0?"No rest":`${rd}d`}
                    </span>
                    <div style={{ color:"rgba(255,255,255,0.3)" }}>{I.edit}</div>
                  </div>
                </div>
              );
            })}
          </div>
        ))
      )}
    </div>
  );
}

// SCREEN: ELIGIBILITY CHECKER
// ══════════════════════════════════════════════════════════════════════════════
function EligibilityScreen({ roster, tournaments }) {
  const [checkDate, setCheckDate] = useState(todayStr());
  const [viewMode, setViewMode] = useState("regular");
  const selectedTourney = tournaments.find(t=>t.id===viewMode);

  function getPitcherTourneyStats(pitcher, tourneyId) {
    const games = (pitcher.history||[]).filter(h=>h.tournamentId===tourneyId);
    const total = games.reduce((s,g)=>s+g.pitches,0);
    const day1 = games.filter(g=>g.tourneyDay===1).reduce((s,g)=>s+g.pitches,0);
    return { total, day1, games };
  }

  function getTourneyEligibility(pitcher, tourney) {
    if (!tourney) return { eligible:true, reason:"" };
    const stats = getPitcherTourneyStats(pitcher, tourney.id);

    // Exceeded tournament total → ineligible for rest of tournament
    if (stats.total >= tourney.maxTotal) return { eligible:false, reason:`Reached tournament total (${stats.total}/${tourney.maxTotal}p)` };

    // Exceeded Day 1 hard limit → ineligible for rest of tournament (only when configured as hard limit)
    if (tourney.day1IsHardLimit && stats.day1 > tourney.maxDay1) return { eligible:false, reason:`Exceeded Day 1 limit (${stats.day1}/${tourney.maxDay1}p)` };

    const remaining = tourney.maxTotal - stats.total;
    return { eligible:true, reason:`${remaining}p remaining in tournament` };
  }

  const totalPitches = p => (p.history || []).reduce((s, g) => s + (g.pitches || 0), 0);
  const allPitchers = [...roster]
    .sort((a, b) => totalPitches(b) - totalPitches(a))
    .map(p => {
      if (viewMode==="regular") {
        const status = getAvailabilityStatus(p, checkDate, tournaments);
        return { ...p, eligible: status==="available", status };
      } else {
        const { eligible, reason } = getTourneyEligibility(p, selectedTourney);
        return { ...p, eligible, status:eligible?"available":"resting", tourneyReason:reason };
      }
    });

  const eligibleList = allPitchers.filter(p=>p.eligible);
  const ineligibleList = allPitchers.filter(p=>!p.eligible);
  const isToday = checkDate===todayStr();
  const isTomorrow = checkDate===addDays(todayStr(),1);
  const displayLabel = isToday?"Today":isTomorrow?"Tomorrow":formatDate(checkDate);

  return (
    <div style={{ padding:"0 16px 110px" }}>
      <div style={{ padding:"16px 0 14px" }}>
        <h2 style={{ margin:0, fontSize:24, fontWeight:800, color:"#f8fafc", fontFamily:"'Bebas Neue',cursive", letterSpacing:2 }}>ELIGIBILITY</h2>
        <p style={{ margin:0, fontSize:12, color:"rgba(255,255,255,0.4)" }}>Check who can pitch on any date</p>
      </div>

      <div style={card}>
        <p style={sectionLabel}>CHECK DATE</p>
        <div style={{ display:"flex", gap:8, marginBottom:10 }}>
          {[[todayStr(),"Today"],[addDays(todayStr(),1),"Tomorrow"],[addDays(todayStr(),2),"In 2 Days"]].map(([d,label])=>(
            <button key={d} onClick={()=>setCheckDate(d)}
              style={{ flex:1, padding:"8px 6px", borderRadius:10,
                border:`1px solid ${checkDate===d?"#38bdf8":"rgba(255,255,255,0.1)"}`,
                background:checkDate===d?"rgba(56,189,248,0.15)":"rgba(255,255,255,0.04)",
                color:checkDate===d?"#38bdf8":"rgba(255,255,255,0.6)", fontSize:12, fontWeight:600, cursor:"pointer" }}>
              {label}
            </button>
          ))}
        </div>
        <input type="date" value={checkDate} onChange={e=>setCheckDate(e.target.value)} style={inputStyle}/>
      </div>

      <div style={card}>
        <p style={sectionLabel}>VIEW FOR</p>
        <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
          <button onClick={()=>setViewMode("regular")}
            style={{ flex:1, minWidth:80, padding:"9px 10px", borderRadius:10,
              border:`1px solid ${viewMode==="regular"?"#2563eb":"rgba(255,255,255,0.1)"}`,
              background:viewMode==="regular"?"rgba(37,99,235,0.2)":"rgba(255,255,255,0.04)",
              color:viewMode==="regular"?"#60a5fa":"rgba(255,255,255,0.6)", fontSize:13, fontWeight:600, cursor:"pointer" }}>
            ⚾ Regular Season
          </button>
          {tournaments.map(t=>(
            <button key={t.id} onClick={()=>setViewMode(t.id)}
              style={{ flex:1, minWidth:80, padding:"9px 10px", borderRadius:10,
                border:`1px solid ${viewMode===t.id?"#f59e0b":"rgba(255,255,255,0.1)"}`,
                background:viewMode===t.id?"rgba(245,158,11,0.15)":"rgba(255,255,255,0.04)",
                color:viewMode===t.id?"#fbbf24":"rgba(255,255,255,0.6)", fontSize:13, fontWeight:600, cursor:"pointer" }}>
              🏆 {t.name}
            </button>
          ))}
        </div>
        {viewMode!=="regular" && selectedTourney && (
          <div style={{ marginTop:8, fontSize:11, color:"rgba(255,255,255,0.35)" }}>
            Day 1 {selectedTourney.day1IsHardLimit?"limit":"guideline"}: {selectedTourney.maxDay1}p · <strong style={{color:"rgba(255,255,255,0.5)"}}>Total limit: {selectedTourney.maxTotal}p</strong>
          </div>
        )}
      </div>

      {roster.length===0 ? (
        <div style={{ textAlign:"center", padding:"40px 0", color:"rgba(255,255,255,0.2)" }}>
          <p>Add players to your roster first</p>
        </div>
      ) : (
        <>
          <div style={{ ...card, border:"1px solid rgba(74,222,128,0.2)" }}>
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
              <span style={{ fontSize:16 }}>✅</span>
              <p style={{ ...sectionLabel, margin:0, color:"#4ade80" }}>
                ELIGIBLE {displayLabel.toUpperCase()} — {eligibleList.length} PITCHER{eligibleList.length!==1?"S":""}
              </p>
            </div>
            {eligibleList.length===0 ? (
              <p style={{ fontSize:13, color:"rgba(255,255,255,0.3)", margin:0 }}>No pitchers available on this date</p>
            ) : eligibleList.map(p=>(
              <div key={p.id} style={{ display:"flex", alignItems:"center", gap:10, padding:"9px 0",
                borderBottom:"1px solid rgba(255,255,255,0.04)" }}>
                <div style={{ width:36, height:36, borderRadius:9, background:"rgba(74,222,128,0.12)",
                  border:"1px solid rgba(74,222,128,0.3)", display:"flex", alignItems:"center", justifyContent:"center",
                  fontFamily:"'Bebas Neue',cursive", fontSize:14, color:"#4ade80", flexShrink:0 }}>
                  {p.jersey?`#${p.jersey}`:p.name[0]}
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:14, fontWeight:700, color:"#f8fafc" }}>{p.name}</div>
                  {viewMode!=="regular" && <div style={{ fontSize:11, color:"rgba(255,255,255,0.4)" }}>{p.tourneyReason}</div>}
                  {viewMode==="regular" && p.lastPitches>0 && <div style={{ fontSize:11, color:"rgba(255,255,255,0.4)" }}>Last: {p.lastPitches}p on {formatDate(p.lastGameDate)}</div>}
                </div>
                <span style={{ fontSize:11, color:"#4ade80", fontWeight:600 }}>Ready</span>
              </div>
            ))}
          </div>

          <div style={{ ...card, border:"1px solid rgba(244,63,94,0.2)" }}>
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
              <span style={{ fontSize:16 }}>🚫</span>
              <p style={{ ...sectionLabel, margin:0, color:"#f43f5e" }}>
                NOT ELIGIBLE — {ineligibleList.length} PITCHER{ineligibleList.length!==1?"S":""}
              </p>
            </div>
            {ineligibleList.length===0 ? (
              <p style={{ fontSize:13, color:"rgba(255,255,255,0.3)", margin:0 }}>All pitchers eligible!</p>
            ) : ineligibleList.map(p=>{
              const left = daysUntilEligible(p, checkDate, tournaments);
              const restLeft = left - (p.lastGameDate === checkDate ? 1 : 0);
              const eligStr = getEligibleDateStr(p, tournaments);
              return (
                <div key={p.id} style={{ display:"flex", alignItems:"center", gap:10, padding:"9px 0",
                  borderBottom:"1px solid rgba(255,255,255,0.04)" }}>
                  <div style={{ width:36, height:36, borderRadius:9, background:"rgba(244,63,94,0.1)",
                    border:"1px solid rgba(244,63,94,0.3)", display:"flex", alignItems:"center", justifyContent:"center",
                    fontFamily:"'Bebas Neue',cursive", fontSize:14, color:"#f43f5e", flexShrink:0 }}>
                    {p.jersey?`#${p.jersey}`:p.name[0]}
                  </div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:14, fontWeight:700, color:"#f8fafc" }}>{p.name}</div>
                    {viewMode!=="regular" && p.tourneyReason ? (
                      <div style={{ fontSize:11, color:"rgba(255,255,255,0.4)" }}>{p.tourneyReason}</div>
                    ) : eligStr ? (
                      <>
                        <div style={{ fontSize:12, fontWeight:700, color:"#fbbf24" }}>Eligible {formatDate(eligStr)}</div>
                        <div style={{ fontSize:11, color:"rgba(255,255,255,0.35)" }}>{restLeft}d rest remaining</div>
                      </>
                    ) : (
                      <div style={{ fontSize:11, color:"rgba(255,255,255,0.4)" }}>Resting</div>
                    )}
                  </div>
                  <Chip status={p.status}/>
                </div>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}
