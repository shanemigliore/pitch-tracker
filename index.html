// SCREEN: SEASON HISTORY — with pitcher filter
// ══════════════════════════════════════════════════════════════════════════════
function SeasonHistory({ roster, onEditGame, onDeleteGame }) {
  const [year, setYear] = useState(new Date().getFullYear().toString());
  const [filterPitcherId, setFilterPitcherId] = useState("all");
  const [editingEntry, setEditingEntry] = useState(null);

  const years = [...new Set(roster.flatMap(p=>(p.history||[]).map(h=>h.date.slice(0,4))))].sort().reverse();
  const displayYear = years.includes(year) ? year : (years[0]||year);

  // All games for this year, optionally filtered
  const allGames = roster.flatMap(p=>
    (p.history||[]).filter(h=>h.date.startsWith(displayYear)).map(h=>({...h, playerName:p.name, jersey:p.jersey, pitcherId:p.id}))
  ).sort((a,b)=>b.date<a.date?-1:1);

  const filteredGames = filterPitcherId==="all"
    ? allGames
    : allGames.filter(g=>String(g.pitcherId)===String(filterPitcherId));

  const totalPitches = filteredGames.reduce((s,g)=>s+g.pitches,0);

  const pitchersWithGames = roster.filter(p=>(p.history||[]).some(h=>h.date.startsWith(displayYear)));

  const leaderboard = roster.map(p=>{
    const games = (p.history||[]).filter(h=>h.date.startsWith(displayYear));
    return { id:p.id, name:p.name, jersey:p.jersey, games:games.length,
      total:games.reduce((s,g)=>s+g.pitches,0),
      avg:games.length?Math.round(games.reduce((s,g)=>s+g.pitches,0)/games.length):0,
      high:games.reduce((m,g)=>Math.max(m,g.pitches),0) };
  }).filter(p=>p.games>0).sort((a,b)=>b.total-a.total);

  const activePitcher = filterPitcherId!=="all" ? roster.find(p=>String(p.id)===String(filterPitcherId)) : null;

  return (
    <div style={{ padding:"0 16px 110px" }}>
      {editingEntry && (
        <EditGameModal
          entry={editingEntry}
          pitcherName={editingEntry.playerName}
          roster={roster}
          tournaments={[]}
          onSave={updated=>{ onEditGame(editingEntry.pitcherId, updated.gameId, updated); setEditingEntry(null); }}
          onDelete={()=>{ onDeleteGame(editingEntry.pitcherId, editingEntry.gameId); setEditingEntry(null); }}
          onClose={()=>setEditingEntry(null)}/>
      )}

      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"16px 0 14px" }}>
        <div>
          <h2 style={{ margin:0, fontSize:24, fontWeight:800, color:"#f8fafc", fontFamily:"'Bebas Neue',cursive", letterSpacing:2 }}>HISTORY</h2>
          <p style={{ margin:0, fontSize:12, color:"rgba(255,255,255,0.4)" }}>{filteredGames.length} appearances</p>
        </div>
        {years.length>1 && (
          <select value={displayYear} onChange={e=>setYear(e.target.value)}
            style={{ background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.1)",
              borderRadius:10, padding:"6px 10px", color:"#f8fafc", fontSize:14 }}>
            {years.map(y=><option key={y} value={y}>{y}</option>)}
          </select>
        )}
      </div>

      {/* Pitcher filter */}
      {pitchersWithGames.length > 1 && (
        <div style={card}>
          <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:8 }}>
            {I.filter}
            <p style={{ ...sectionLabel, margin:0 }}>FILTER BY PITCHER</p>
          </div>
          <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
            <button onClick={()=>setFilterPitcherId("all")}
              style={{ padding:"6px 12px", borderRadius:20,
                border:`1px solid ${filterPitcherId==="all"?"#38bdf8":"rgba(255,255,255,0.1)"}`,
                background:filterPitcherId==="all"?"rgba(56,189,248,0.15)":"rgba(255,255,255,0.04)",
                color:filterPitcherId==="all"?"#38bdf8":"rgba(255,255,255,0.5)",
                fontSize:12, fontWeight:700, cursor:"pointer" }}>
              All Pitchers
            </button>
            {pitchersWithGames.map(p=>(
              <button key={p.id} onClick={()=>setFilterPitcherId(String(p.id))}
                style={{ padding:"6px 12px", borderRadius:20,
                  border:`1px solid ${String(filterPitcherId)===String(p.id)?"#38bdf8":"rgba(255,255,255,0.1)"}`,
                  background:String(filterPitcherId)===String(p.id)?"rgba(56,189,248,0.15)":"rgba(255,255,255,0.04)",
                  color:String(filterPitcherId)===String(p.id)?"#38bdf8":"rgba(255,255,255,0.5)",
                  fontSize:12, fontWeight:700, cursor:"pointer" }}>
                {p.jersey?`#${p.jersey} `:""}{p.name}
              </button>
            ))}
          </div>
        </div>
      )}

      {filteredGames.length===0 ? (
        <div style={{ textAlign:"center", padding:"60px 0", color:"rgba(255,255,255,0.2)" }}>
          <div style={{ fontSize:56, marginBottom:12 }}>📊</div>
          <p style={{ fontSize:15, fontWeight:600 }}>
            {filterPitcherId==="all" ? `No games logged for ${displayYear}` : `No games for ${activePitcher?.name} in ${displayYear}`}
          </p>
        </div>
      ) : (
        <>
          {/* Summary stats */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8, marginBottom:12 }}>
            {[["Total",totalPitches+"p","#38bdf8"],
              ["Games",filteredGames.length,"#4ade80"],
              ["Tourney",filteredGames.filter(g=>g.isTournament).length,"#f59e0b"]
            ].map(([l,v,c])=>(
              <div key={l} style={{ textAlign:"center", padding:"12px 6px", background:"rgba(255,255,255,0.03)",
                border:"1px solid rgba(255,255,255,0.07)", borderRadius:12 }}>
                <div style={{ fontSize:22, fontWeight:900, color:c, fontFamily:"'Bebas Neue',cursive" }}>{v}</div>
                <div style={{ fontSize:10, color:"rgba(255,255,255,0.35)" }}>{l}</div>
              </div>
            ))}
          </div>

          {/* Leaderboard — only when showing all pitchers */}
          {filterPitcherId==="all" && leaderboard.length>0 && (
            <div style={card}>
              <p style={sectionLabel}>LEADERBOARD</p>
              <div style={{ display:"grid", gridTemplateColumns:"1fr auto auto auto", gap:"5px 12px",
                fontSize:10, color:"rgba(255,255,255,0.35)", fontWeight:700, letterSpacing:1,
                marginBottom:6, paddingBottom:6, borderBottom:"1px solid rgba(255,255,255,0.07)" }}>
                <span>PLAYER</span><span>G</span><span>AVG</span><span>TOT</span>
              </div>
              {leaderboard.map((p,i)=>(
                <div key={p.id} style={{ display:"grid", gridTemplateColumns:"1fr auto auto auto", gap:"5px 12px",
                  padding:"7px 0", borderBottom:i<leaderboard.length-1?"1px solid rgba(255,255,255,0.04)":"none", alignItems:"center",
                  cursor:"pointer" }}
                  onClick={()=>setFilterPitcherId(String(p.id))}>
                  <div style={{ display:"flex", alignItems:"center", gap:7 }}>
                    <span style={{ width:20, height:20, borderRadius:6,
                      background:i===0?"rgba(251,191,36,0.2)":i===1?"rgba(156,163,175,0.15)":i===2?"rgba(180,120,60,0.15)":"rgba(255,255,255,0.04)",
                      display:"flex", alignItems:"center", justifyContent:"center",
                      fontSize:10, fontWeight:800, color:i===0?"#fbbf24":i===1?"#9ca3af":i===2?"#b47a3c":"rgba(255,255,255,0.3)", flexShrink:0 }}>

                    </span>
                    <span style={{ fontSize:13, color:"rgba(255,255,255,0.8)", fontWeight:600 }}>{p.jersey?`#${p.jersey} `:""}{p.name}</span>
                  </div>
                  <span style={{ fontSize:13, color:"rgba(255,255,255,0.5)", fontFamily:"'DM Mono',monospace", textAlign:"right" }}>{p.games}</span>
                  <span style={{ fontSize:13, color:"#38bdf8", fontFamily:"'DM Mono',monospace", textAlign:"right" }}>{p.avg}p</span>
                  <span style={{ fontSize:13, color:"#f8fafc", fontFamily:"'DM Mono',monospace", fontWeight:700, textAlign:"right" }}>{p.total}p</span>
                </div>
              ))}
              <p style={{ margin:"8px 0 0", fontSize:10, color:"rgba(255,255,255,0.25)" }}>Tap a player to filter their games</p>
            </div>
          )}

          {/* Filtered pitcher summary */}
          {activePitcher && (
            <div style={{ ...card, border:"1px solid rgba(56,189,248,0.2)", background:"rgba(56,189,248,0.04)" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div>
                  <div style={{ fontSize:15, fontWeight:800, color:"#38bdf8" }}>{activePitcher.jersey?`#${activePitcher.jersey} `:""}{activePitcher.name}</div>
                  <div style={{ fontSize:12, color:"rgba(255,255,255,0.4)", marginTop:2 }}>
                    {filteredGames.length} appearances · {totalPitches}p total · avg {filteredGames.length?Math.round(totalPitches/filteredGames.length):0}p/game
                  </div>
                </div>
                <Chip status={getAvailabilityStatus(activePitcher)} size="lg"/>
              </div>
            </div>
          )}

          {/* All appearances — editable */}
          <div style={card}>
            <p style={sectionLabel}>APPEARANCES — TAP TO EDIT</p>
            {filteredGames.map((g,i)=>{
              const rd = getRegRestDays(g.pitches);
              return (
                <div key={g.gameId||i} onClick={()=>setEditingEntry(g)}
                  style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
                    padding:"10px 10px", borderRadius:10, marginBottom:4, cursor:"pointer",
                    background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.05)" }}
                  onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.05)"}
                  onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,0.02)"}>
                  <div>
                    <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                      {filterPitcherId==="all" && (
                        <span style={{ fontSize:13, fontWeight:700, color:"rgba(255,255,255,0.85)" }}>
                          {g.jersey?`#${g.jersey} `:""}{g.playerName}
                        </span>
                      )}
                      {g.isTournament && <span style={{ fontSize:9, padding:"1px 5px", background:"rgba(245,158,11,0.15)",
                        border:"1px solid rgba(245,158,11,0.25)", borderRadius:6, color:"#f59e0b", fontWeight:700 }}>
                        {g.tournamentName||"TOURNEY"}{g.tourneyDay?` D${g.tourneyDay}`:""}
                      </span>}
                    </div>
                    <div style={{ fontSize:11, color:"rgba(255,255,255,0.35)" }}>
                      {formatDate(g.date)}{g.opponent?` · vs ${g.opponent}`:""}
                    </div>
                  </div>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <div style={{ textAlign:"right" }}>
                      <div style={{ fontSize:15, fontWeight:800, color:"#f8fafc", fontFamily:"'Bebas Neue',cursive" }}>{g.pitches}p</div>
                      <div style={{ fontSize:11, color:rd===0?"#4ade80":rd<=1?"#a3e635":rd<=2?"#fb923c":"#f43f5e", fontWeight:600 }}>
                        {rd===0?"No rest":`${rd}d`}
                      </div>
                    </div>
                    <div style={{ color:"rgba(255,255,255,0.3)" }}>{I.edit}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}

// DATA PANEL — Export / Import
// ══════════════════════════════════════════════════════════════════════════════
function DataPanel({ roster, tournaments, onImport, onClose }) {
  const [importState, setImportState] = useState("idle"); // idle | confirm | done | error
  const [importData, setImportData] = useState(null);
  const [importMsg, setImportMsg] = useState("");
  const fileRef = useRef(null);

  function handleExport() {
    const blob = new Blob([JSON.stringify({ roster, tournaments, exportedAt: new Date().toISOString(), version:1 }, null, 2)],
      { type:"application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `pitch-tracker-${todayStr()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function handleFileChange(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = evt => {
      try {
        const data = JSON.parse(evt.target.result);
        if (!Array.isArray(data.roster)) throw new Error("Invalid file");
        setImportData(data);
        setImportMsg(`Found ${data.roster.length} player${data.roster.length!==1?"s":""} and ${(data.tournaments||[]).length} tournament${(data.tournaments||[]).length!==1?"s":""}.`);
        setImportState("confirm");
      } catch {
        setImportState("error");
        setImportMsg("This file doesn't look like a valid Pitch Tracker export.");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  function handleConfirmImport() {
    onImport(importData.roster, importData.tournaments||[]);
    setImportState("done");
    setImportMsg(`Imported ${importData.roster.length} player${importData.roster.length!==1?"s":""}!`);
  }

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.8)", zIndex:60,
      display:"flex", alignItems:"flex-end", justifyContent:"center" }}
      onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div style={{ width:"100%", maxWidth:430, background:"#0f1623",
        border:"1px solid rgba(255,255,255,0.12)", borderRadius:"20px 20px 0 0",
        padding:"20px 18px 48px" }}>

        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:18 }}>
          <div style={{ fontSize:16, fontWeight:800, color:"#f8fafc" }}>Data Export / Import</div>
          <button onClick={onClose} style={{ background:"rgba(255,255,255,0.07)", border:"none", borderRadius:8,
            width:32, height:32, color:"rgba(255,255,255,0.5)", cursor:"pointer", display:"flex",
            alignItems:"center", justifyContent:"center" }}>{I.xmark}</button>
        </div>

        {/* Export */}
        <div style={{ ...card, border:"1px solid rgba(74,222,128,0.2)", marginBottom:12 }}>
          <p style={{ ...sectionLabel, color:"#4ade80" }}>EXPORT</p>
          <p style={{ margin:"0 0 12px", fontSize:13, color:"rgba(255,255,255,0.5)", lineHeight:1.5 }}>
            Download all roster and tournament data as a JSON file. Use this to back up your data or transfer it to another device.
          </p>
          <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, color:"rgba(255,255,255,0.35)", marginBottom:12 }}>
            <span>👤 {roster.length} player{roster.length!==1?"s":""}</span>
            <span>🏆 {tournaments.length} tournament{tournaments.length!==1?"s":""}</span>
            <span>📋 {roster.reduce((s,p)=>(p.history||[]).length+s,0)} game entries</span>
          </div>
          <button onClick={handleExport}
            style={{ ...primaryBtn, width:"100%", background:"linear-gradient(135deg,#16a34a,#15803d)",
              boxShadow:"0 3px 14px rgba(22,163,74,0.35)" }}>
            {I.download} Download Backup File
          </button>
        </div>

        {/* Import */}
        <div style={{ ...card, border:"1px solid rgba(56,189,248,0.2)" }}>
          <p style={{ ...sectionLabel, color:"#38bdf8" }}>IMPORT</p>

          {importState==="idle" && (
            <>
              <p style={{ margin:"0 0 12px", fontSize:13, color:"rgba(255,255,255,0.5)", lineHeight:1.5 }}>
                Load a previously exported backup file. <strong style={{color:"#f43f5e"}}>This will replace all current data.</strong>
              </p>
              <input ref={fileRef} type="file" accept=".json" onChange={handleFileChange}
                style={{ display:"none" }}/>
              <button onClick={()=>fileRef.current.click()}
                style={{ ...primaryBtn, width:"100%" }}>
                {I.upload} Choose Backup File
              </button>
            </>
          )}

          {importState==="confirm" && (
            <>
              <p style={{ margin:"0 0 4px", fontSize:13, color:"rgba(255,255,255,0.7)", fontWeight:600 }}>Ready to import:</p>
              <p style={{ margin:"0 0 12px", fontSize:13, color:"#38bdf8" }}>{importMsg}</p>
              <p style={{ margin:"0 0 12px", fontSize:12, color:"rgba(244,63,94,0.8)" }}>
                ⚠ This will overwrite all existing players, history, and tournaments.
              </p>
              <div style={{ display:"flex", gap:8 }}>
                <button onClick={()=>{ setImportState("idle"); setImportData(null); }} style={cancelBtn}>Cancel</button>
                <button onClick={handleConfirmImport}
                  style={{ ...primaryBtn, flex:2, background:"linear-gradient(135deg,#1d4ed8,#2563eb)" }}>
                  {I.check} Confirm Import
                </button>
              </div>
            </>
          )}

          {importState==="done" && (
            <p style={{ margin:0, fontSize:14, color:"#4ade80", fontWeight:700, textAlign:"center", padding:"8px 0" }}>
              ✅ {importMsg}
            </p>
          )}

          {importState==="error" && (
            <>
              <p style={{ margin:"0 0 12px", fontSize:13, color:"#f43f5e" }}>{importMsg}</p>
              <button onClick={()=>setImportState("idle")} style={{ ...cancelBtn, width:"100%" }}>Try Again</button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// ROOT APP
// ══════════════════════════════════════════════════════════════════════════════
const TABS = [
  { id:"roster",      label:"Roster",   icon:I.roster      },
  { id:"gamelog",     label:"Game Log", icon:I.gamelog     },
  { id:"eligibility", label:"Eligible", icon:I.eligibility },
  { id:"tournament",  label:"Tourney",  icon:I.tournament  },
  { id:"history",     label:"History",  icon:I.history     },
];

function App() {
  const [roster, setRoster] = useState([]);
  const [tournaments, setTournaments] = useState([]);
  const [tab, setTab] = useState("roster");
  const [selectedPlayer, setSelectedPlayer] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [showData, setShowData] = useState(false);
  const [syncStatus, setSyncStatus] = useState("connecting"); // connecting | synced | saving | offline

  // Firebase real-time listener — all clients stay in sync
  useEffect(()=>{
    if (!window.__fbSubscribe) {
      // Fallback: no Firebase available, mark loaded with empty data
      setLoaded(true);
      setSyncStatus("offline");
      return;
    }
    const unsub = window.__fbSubscribe((data) => {
      setRoster(data.roster || []);
      setTournaments(data.tournaments || []);
      setLoaded(true);
      setSyncStatus("synced");
    }, () => setSyncStatus("offline"));
    return () => unsub && unsub();
  }, []);

  // Write to Firebase whenever data changes (after initial load)
  const saveTimeoutRef = useRef(null);
  useEffect(()=>{
    if (!loaded || !window.__fbSet) return;
    setSyncStatus("saving");
    clearTimeout(saveTimeoutRef.current);
    saveTimeoutRef.current = setTimeout(() => {
      // Write both keys and wait for both to confirm before marking synced
      Promise.all([
        window.__fbSet("roster", roster),
        window.__fbSet("tournaments", tournaments),
      ]).then(() => setSyncStatus("synced"))
        .catch(() => setSyncStatus("offline"));
    }, 600); // debounce rapid changes
  }, [roster, tournaments, loaded]);

  const addPlayer = useCallback(p=>setRoster(r=>[...r,p]), []);
  const deletePlayer = useCallback(id=>{ setRoster(r=>r.filter(p=>p.id!==id)); setSelectedPlayer(null); }, []);

  const editPlayer = useCallback((id, updates) => {
    setRoster(r=>r.map(p=>p.id===id ? {...p,...updates} : p));
    setSelectedPlayer(prev=>prev&&prev.id===id ? {...prev,...updates} : prev);
  }, []);
  const addTourney = useCallback(t=>setTournaments(ts=>[...ts,t]), []);
  const deleteTourney = useCallback(id=>setTournaments(ts=>ts.filter(t=>t.id!==id)), []);

  const importData = useCallback((newRoster, newTournaments) => {
    setRoster(newRoster);
    setTournaments(newTournaments);
    setSelectedPlayer(null);
    if (window.__fbSet) {
      Promise.all([
        window.__fbSet("roster", newRoster),
        window.__fbSet("tournaments", newTournaments),
      ]).catch(console.error);
    }
  }, []);

  const logGame = useCallback((playerId, gameData) => {
    const entry = { ...gameData, gameId: gameData.gameId || newId() };
    setRoster(r=>r.map(p=>{
      if(p.id!==playerId) return p;
      const history = [...(p.history||[]), entry];
      return { ...p, ...recomputeLast(history), history };
    }));
    setSelectedPlayer(prev=>{
      if(!prev||prev.id!==playerId) return prev;
      const history = [...(prev.history||[]), entry];
      return { ...prev, ...recomputeLast(history), history };
    });
  }, []);

  const logMultiple = useCallback((playerId, gameData) => {
    const entry = { ...gameData, gameId: gameData.gameId || newId() };
    setRoster(r=>r.map(p=>{
      if(p.id!==playerId) return p;
      const history = [...(p.history||[]), entry];
      return { ...p, ...recomputeLast(history), history };
    }));
  }, []);

  const editGame = useCallback((playerId, gameId, updatedData) => {
    setRoster(r=>r.map(p=>{
      if(p.id!==playerId) return p;
      const history = (p.history||[]).map(h=>h.gameId===gameId ? {...h,...updatedData} : h);
      return { ...p, ...recomputeLast(history), history };
    }));
    setSelectedPlayer(prev=>{
      if(!prev||prev.id!==playerId) return prev;
      const history = (prev.history||[]).map(h=>h.gameId===gameId ? {...h,...updatedData} : h);
      return { ...prev, ...recomputeLast(history), history };
    });
  }, []);

  const deleteGame = useCallback((playerId, gameId) => {
    setRoster(r=>r.map(p=>{
      if(p.id!==playerId) return p;
      const history = (p.history||[]).filter(h=>h.gameId!==gameId);
      return { ...p, ...recomputeLast(history), history };
    }));
    setSelectedPlayer(prev=>{
      if(!prev||prev.id!==playerId) return prev;
      const history = (prev.history||[]).filter(h=>h.gameId!==gameId);
      return { ...prev, ...recomputeLast(history), history };
    });
  }, []);

  if (!loaded) return (
    <div style={{ background:"#080c14", minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ color:"rgba(255,255,255,0.3)", fontSize:14 }}>Loading...</div>
    </div>
  );

  const availableCount = roster.filter(p=>getAvailabilityStatus(p)==="available").length;
  const restingCount = roster.filter(p=>getAvailabilityStatus(p)!=="available").length;

  return (
    <div style={{ background:"#080c14", minHeight:"100vh", maxWidth:430, margin:"0 auto",
      fontFamily:"'Barlow',sans-serif", color:"#f8fafc", position:"relative",
      backgroundImage:"radial-gradient(ellipse at 20% 0%,rgba(30,58,138,0.25) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(22,101,52,0.15) 0%,transparent 60%)" }}>

      <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

      {showData && (
        <DataPanel roster={roster} tournaments={tournaments}
          onImport={importData} onClose={()=>setShowData(false)}/>
      )}

      <div style={{ background:"rgba(8,12,20,0.9)", backdropFilter:"blur(16px)",
        borderBottom:"1px solid rgba(255,255,255,0.06)", padding:"12px 16px",
        position:"sticky", top:0, zIndex:20 }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ width:32, height:32, borderRadius:9, background:"linear-gradient(135deg,#1d4ed8,#1e40af)",
            display:"flex", alignItems:"center", justifyContent:"center", fontSize:17 }}>⚾</div>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:15, fontWeight:800, color:"#f8fafc", fontFamily:"'Bebas Neue',cursive", letterSpacing:2, lineHeight:1 }}>PITCH COUNT TRACKER</div>
            <div style={{ fontSize:10, color:"rgba(255,255,255,0.35)", letterSpacing:0.5 }}>Minor/Majors · 55 pitch limit</div>
          </div>
          <div style={{ display:"flex", gap:5, alignItems:"center" }}>
            {availableCount>0 && <div style={{ padding:"3px 8px", borderRadius:8, background:"rgba(74,222,128,0.15)", fontSize:11, fontWeight:700, color:"#4ade80" }}>{availableCount}✓</div>}
            {restingCount>0 && <div style={{ padding:"3px 8px", borderRadius:8, background:"rgba(244,63,94,0.15)", fontSize:11, fontWeight:700, color:"#f43f5e" }}>{restingCount}⏳</div>}
            <div title={syncStatus} style={{ width:7, height:7, borderRadius:"50%", flexShrink:0,
              background: syncStatus==="synced"?"#4ade80": syncStatus==="saving"?"#fbbf24": syncStatus==="offline"?"#f43f5e":"rgba(255,255,255,0.3)",
              boxShadow: syncStatus==="synced"?"0 0 6px #4ade80": syncStatus==="saving"?"0 0 6px #fbbf24": syncStatus==="offline"?"0 0 6px #f43f5e":"none",
              transition:"background 0.4s, box-shadow 0.4s" }}/>
            <button onClick={()=>setShowData(true)}
              style={{ background:"rgba(255,255,255,0.07)", border:"1px solid rgba(255,255,255,0.1)",
                borderRadius:8, padding:"5px 8px", color:"rgba(255,255,255,0.5)", cursor:"pointer",
                fontSize:11, fontWeight:700, letterSpacing:0.5 }}>
              ⬆⬇
            </button>
          </div>
        </div>
      </div>

      <div>
        {tab==="roster" && selectedPlayer ? (
          <PitcherDetail pitcher={selectedPlayer} onBack={()=>setSelectedPlayer(null)}
            onLog={logGame} onDelete={deletePlayer} tournaments={tournaments}
            onEditGame={editGame} onDeleteGame={deleteGame} onEditPlayer={editPlayer}/>
        ) : tab==="roster" ? (
          <RosterScreen roster={roster} onAdd={addPlayer} onSelect={p=>setSelectedPlayer(p)} onEditPlayer={editPlayer}/>
        ) : tab==="gamelog" ? (
          <GameLogScreen roster={roster} onLogMultiple={logMultiple} tournaments={tournaments}
            onEditGame={editGame} onDeleteGame={deleteGame}/>
        ) : tab==="eligibility" ? (
          <EligibilityScreen roster={roster} tournaments={tournaments}/>
        ) : tab==="tournament" ? (
          <TournamentScreen roster={roster} tournaments={tournaments} onAddTourney={addTourney} onDeleteTourney={deleteTourney}/>
        ) : (
          <SeasonHistory roster={roster} onEditGame={editGame} onDeleteGame={deleteGame}/>
        )}
      </div>

      <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)",
        width:"100%", maxWidth:430, background:"rgba(8,12,20,0.97)", backdropFilter:"blur(20px)",
        borderTop:"1px solid rgba(255,255,255,0.07)", paddingBottom:"env(safe-area-inset-bottom,0px)" }}>
        <div style={{ display:"flex" }}>
          {TABS.map(t=>{
            const active = (tab===t.id && !selectedPlayer) || (tab==="roster" && selectedPlayer && t.id==="roster");
            return (
              <button key={t.id} onClick={()=>{ setTab(t.id); if(t.id!=="roster") setSelectedPlayer(null); }}
                style={{ flex:1, background:"transparent", border:"none", cursor:"pointer",
                  padding:"9px 0 7px", display:"flex", flexDirection:"column", alignItems:"center", gap:2 }}>
                <div style={{ color:active?"#38bdf8":"rgba(255,255,255,0.3)", transition:"color 0.2s" }}>{t.icon}</div>
                <span style={{ fontSize:9, fontWeight:700, letterSpacing:0.5,
                  color:active?"#38bdf8":"rgba(255,255,255,0.3)", transition:"color 0.2s" }}>
                  {t.label.toUpperCase()}
                </span>
                {active && <div style={{ width:14, height:2, background:"#38bdf8", borderRadius:1 }}/>}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

window.__PitchApp = App;


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(window.__PitchApp));
  </script>

  <!-- Service worker for offline shell -->

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const swCode = `
          const CACHE = 'pitch-tracker-fb-v1';
          self.addEventListener('install', e => {
            e.waitUntil(caches.open(CACHE).then(c => c.add(location.href)).then(() => self.skipWaiting()));
          });
          self.addEventListener('activate', e => {
            e.waitUntil(
              caches.keys().then(keys =>
                Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
              ).then(() => self.clients.claim())
            );
          });
          self.addEventListener('fetch', e => {
            // Let Firebase/network requests pass through; cache app shell only
            if (e.request.url.includes('firebaseio.com') ||
                e.request.url.includes('googleapis.com') ||
                e.request.url.includes('gstatic.com')) {
              e.respondWith(fetch(e.request).catch(() => new Response('', {status: 503})));
              return;
            }
            e.respondWith(
              caches.match(e.request).then(r => r || fetch(e.request).then(res => {
                if (res && res.status === 200 && e.request.method === 'GET') {
                  caches.open(CACHE).then(c => c.put(e.request, res.clone()));
                }
                return res;
              }).catch(() => caches.match(e.request)))
            );
          });
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
      });
    }
  </script>
