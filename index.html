// SCREEN: TOURNAMENT MANAGER
// ══════════════════════════════════════════════════════════════════════════════
function TournamentScreen({ roster, tournaments, onAddTourney, onDeleteTourney, onUpdateTourney }) {
  const [view, setView] = useState("list");
  const [editId, setEditId] = useState(null);
  const [name, setName] = useState("");
  const [startDate, setStartDate] = useState(todayStr());
  const [days, setDays] = useState("2");
  const [customDays, setCustomDays] = useState("");
  const [maxDay1, setMaxDay1] = useState("55");
  const [maxTotal, setMaxTotal] = useState("115");
  const [day1IsHardLimit, setDay1IsHardLimit] = useState(false);
  const [confirmDeleteTourney, setConfirmDeleteTourney] = useState(false);

  function openEdit(t) {
    setEditId(t.id);
    setName(t.name);
    setStartDate(t.startDate || todayStr());
    const d = t.days || 2;
    if (d === 1 || d === 2) { setDays(String(d)); setCustomDays(""); }
    else { setDays("custom"); setCustomDays(String(d)); }
    setMaxDay1(String(t.maxDay1 || 55));
    setMaxTotal(String(t.maxTotal || 115));
    setDay1IsHardLimit(!!t.day1IsHardLimit);
    setView("edit");
  }

  function handleCreate() {
    if (!name.trim()) return;
    const resolvedDays = days==="custom" ? (parseInt(customDays)||1) : (parseInt(days)||2);
    onAddTourney({ id:newId(), name:name.trim(), startDate, days:resolvedDays,
      maxDay1:parseInt(maxDay1)||55,
      maxTotal:parseInt(maxTotal)||115,
      day1IsHardLimit,
      createdAt:todayStr() });
    setName(""); setStartDate(todayStr()); setDays("2"); setCustomDays(""); setMaxDay1("55"); setMaxTotal("115"); setDay1IsHardLimit(false);
    setView("list");
  }

  function handleSaveEdit() {
    if (!name.trim() || !editId) return;
    const resolvedDays = days==="custom" ? (parseInt(customDays)||1) : (parseInt(days)||2);
    const original = tournaments.find(t=>t.id===editId);
    onUpdateTourney({ ...original, name:name.trim(), startDate, days:resolvedDays,
      maxDay1:parseInt(maxDay1)||55,
      maxTotal:parseInt(maxTotal)||115,
      day1IsHardLimit });
    setEditId(null);
    setView(editId);
  }

  if (view==="create") {
    return (
      <div style={{ padding:"0 16px 110px" }}>
        <div style={{ display:"flex", alignItems:"center", gap:10, padding:"14px 0 18px" }}>
          <button onClick={()=>setView("list")} style={{ background:"rgba(255,255,255,0.07)", border:"none", borderRadius:10,
            padding:10, color:"rgba(255,255,255,0.7)", cursor:"pointer", display:"flex" }}>{I.back}</button>
          <h2 style={{ margin:0, fontSize:22, fontWeight:800, color:"#f8fafc", fontFamily:"'Bebas Neue',cursive", letterSpacing:1.5 }}>NEW TOURNAMENT</h2>
        </div>
        <div style={card}>
          <p style={sectionLabel}>DETAILS</p>
          <label style={{ ...sectionLabel, display:"block", marginBottom:4 }}>NAME</label>
          <input placeholder="e.g. District 5 Tournament" value={name} onChange={e=>setName(e.target.value)}
            style={{ ...inputStyle, marginBottom:10 }}/>
          <label style={{ ...sectionLabel, display:"block", marginBottom:4 }}>START DATE</label>
          <input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)}
            style={{ ...inputStyle, marginBottom:10 }}/>
          <label style={{ ...sectionLabel, display:"block", marginBottom:4 }}>NUMBER OF DAYS</label>
          <div style={{ display:"flex", gap:8, marginBottom:days==="custom"?10:0 }}>
            {[["1","1"],["2","2"],["custom","Custom"]].map(([val,label])=>(
              <button key={val} onClick={()=>setDays(val)}
                style={{ flex:1, height:42, borderRadius:10,
                  border:`1px solid ${days===val?"#38bdf8":"rgba(255,255,255,0.1)"}`,
                  background:days===val?"rgba(56,189,248,0.15)":"rgba(255,255,255,0.04)",
                  color:days===val?"#38bdf8":"rgba(255,255,255,0.6)", fontSize:14, fontWeight:700, cursor:"pointer",
                  fontFamily:"'Bebas Neue',cursive" }}>{label}</button>
            ))}
          </div>
          {days==="custom" && (
            <input type="number" min="1" max="14" placeholder="Number of days"
              value={customDays} onChange={e=>setCustomDays(e.target.value)}
              style={{ ...inputStyle, textAlign:"center", fontSize:18, fontWeight:800,
                fontFamily:"'Bebas Neue',cursive" }}/>
          )}
        </div>
        <div style={card}>
          <p style={sectionLabel}>PITCH RULES</p>

          <label style={{ ...sectionLabel, display:"block", marginBottom:4 }}>MAX PITCHES — DAY 1</label>
          <input type="number" min="1" placeholder="55" value={maxDay1} onChange={e=>setMaxDay1(e.target.value)}
            style={{ ...inputStyle, fontSize:18, fontFamily:"'Bebas Neue',cursive", fontWeight:800, textAlign:"center", marginBottom:10 }}/>

          <label style={{ ...sectionLabel, display:"block", marginBottom:6 }}>DAY 1 LIMIT TYPE</label>
          <div style={{ display:"flex", gap:8, marginBottom:14 }}>
            <button onClick={()=>setDay1IsHardLimit(false)}
              style={{ flex:1, padding:"10px 8px", borderRadius:10,
                border:`1px solid ${!day1IsHardLimit?"#4ade80":"rgba(255,255,255,0.1)"}`,
                background:!day1IsHardLimit?"rgba(74,222,128,0.12)":"rgba(255,255,255,0.04)",
                color:!day1IsHardLimit?"#4ade80":"rgba(255,255,255,0.5)", fontSize:13, fontWeight:600, cursor:"pointer" }}>
              Guideline only
            </button>
            <button onClick={()=>setDay1IsHardLimit(true)}
              style={{ flex:1, padding:"10px 8px", borderRadius:10,
                border:`1px solid ${day1IsHardLimit?"#f43f5e":"rgba(255,255,255,0.1)"}`,
                background:day1IsHardLimit?"rgba(244,63,94,0.12)":"rgba(255,255,255,0.04)",
                color:day1IsHardLimit?"#f43f5e":"rgba(255,255,255,0.5)", fontSize:13, fontWeight:600, cursor:"pointer" }}>
              Hard limit
            </button>
          </div>
          <p style={{ margin:"0 0 14px", fontSize:11, color:"rgba(255,255,255,0.4)", lineHeight:1.5 }}>
            {day1IsHardLimit
              ? <><strong style={{color:"#f43f5e"}}>Hard limit:</strong> exceeding the Day 1 cap makes a pitcher ineligible for the rest of the tournament.</>
              : <><strong style={{color:"#4ade80"}}>Guideline:</strong> Day 1 limit is informational only and does not affect eligibility.</>}
          </p>

          <label style={{ ...sectionLabel, display:"block", marginBottom:4 }}>MAX PITCHES — ENTIRE TOURNAMENT (eligibility limit)</label>
          <input type="number" min="1" placeholder="115" value={maxTotal} onChange={e=>setMaxTotal(e.target.value)}
            style={{ ...inputStyle, fontSize:18, fontFamily:"'Bebas Neue',cursive", fontWeight:800, textAlign:"center" }}/>
        </div>
        <button onClick={handleCreate} disabled={!name.trim()}
          style={{ ...primaryBtn, width:"100%", padding:14, opacity:name.trim()?1:0.4,
            background:"linear-gradient(135deg,#d97706,#b45309)",
            boxShadow:"0 4px 20px rgba(217,119,6,0.35)" }}>
          🏆 Create Tournament
        </button>
      </div>
    );
  }

  if (view==="edit") {
    return (
      <div style={{ padding:"0 16px 110px" }}>
        <div style={{ display:"flex", alignItems:"center", gap:10, padding:"14px 0 18px" }}>
          <button onClick={()=>{ setEditId(null); setView(editId); }} style={{ background:"rgba(255,255,255,0.07)", border:"none", borderRadius:10,
            padding:10, color:"rgba(255,255,255,0.7)", cursor:"pointer", display:"flex" }}>{I.back}</button>
          <h2 style={{ margin:0, fontSize:22, fontWeight:800, color:"#f8fafc", fontFamily:"'Bebas Neue',cursive", letterSpacing:1.5 }}>EDIT TOURNAMENT</h2>
        </div>
        <div style={card}>
          <p style={sectionLabel}>DETAILS</p>
          <label style={{ ...sectionLabel, display:"block", marginBottom:4 }}>NAME</label>
          <input placeholder="e.g. District 5 Tournament" value={name} onChange={e=>setName(e.target.value)}
            style={{ ...inputStyle, marginBottom:10 }}/>
          <label style={{ ...sectionLabel, display:"block", marginBottom:4 }}>START DATE</label>
          <input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)}
            style={{ ...inputStyle, marginBottom:10 }}/>
          <label style={{ ...sectionLabel, display:"block", marginBottom:4 }}>NUMBER OF DAYS</label>
          <div style={{ display:"flex", gap:8, marginBottom:days==="custom"?10:0 }}>
            {[["1","1"],["2","2"],["custom","Custom"]].map(([val,label])=>(
              <button key={val} onClick={()=>setDays(val)}
                style={{ flex:1, height:42, borderRadius:10,
                  border:`1px solid ${days===val?"#38bdf8":"rgba(255,255,255,0.1)"}`,
                  background:days===val?"rgba(56,189,248,0.15)":"rgba(255,255,255,0.04)",
                  color:days===val?"#38bdf8":"rgba(255,255,255,0.6)", fontSize:14, fontWeight:700, cursor:"pointer",
                  fontFamily:"'Bebas Neue',cursive" }}>{label}</button>
            ))}
          </div>
          {days==="custom" && (
            <input type="number" min="1" max="14" placeholder="Number of days"
              value={customDays} onChange={e=>setCustomDays(e.target.value)}
              style={{ ...inputStyle, textAlign:"center", fontSize:18, fontWeight:800,
                fontFamily:"'Bebas Neue',cursive" }}/>
          )}
        </div>
        <div style={card}>
          <p style={sectionLabel}>PITCH RULES</p>
          <label style={{ ...sectionLabel, display:"block", marginBottom:4 }}>MAX PITCHES — DAY 1</label>
          <input type="number" min="1" placeholder="55" value={maxDay1} onChange={e=>setMaxDay1(e.target.value)}
            style={{ ...inputStyle, fontSize:18, fontFamily:"'Bebas Neue',cursive", fontWeight:800, textAlign:"center", marginBottom:10 }}/>
          <label style={{ ...sectionLabel, display:"block", marginBottom:6 }}>DAY 1 LIMIT TYPE</label>
          <div style={{ display:"flex", gap:8, marginBottom:14 }}>
            <button onClick={()=>setDay1IsHardLimit(false)}
              style={{ flex:1, padding:"10px 8px", borderRadius:10,
                border:`1px solid ${!day1IsHardLimit?"#4ade80":"rgba(255,255,255,0.1)"}`,
                background:!day1IsHardLimit?"rgba(74,222,128,0.12)":"rgba(255,255,255,0.04)",
                color:!day1IsHardLimit?"#4ade80":"rgba(255,255,255,0.5)", fontSize:13, fontWeight:600, cursor:"pointer" }}>
              Guideline only
            </button>
            <button onClick={()=>setDay1IsHardLimit(true)}
              style={{ flex:1, padding:"10px 8px", borderRadius:10,
                border:`1px solid ${day1IsHardLimit?"#f43f5e":"rgba(255,255,255,0.1)"}`,
                background:day1IsHardLimit?"rgba(244,63,94,0.12)":"rgba(255,255,255,0.04)",
                color:day1IsHardLimit?"#f43f5e":"rgba(255,255,255,0.5)", fontSize:13, fontWeight:600, cursor:"pointer" }}>
              Hard limit
            </button>
          </div>
          <p style={{ margin:"0 0 14px", fontSize:11, color:"rgba(255,255,255,0.4)", lineHeight:1.5 }}>
            {day1IsHardLimit
              ? <><strong style={{color:"#f43f5e"}}>Hard limit:</strong> exceeding the Day 1 cap makes a pitcher ineligible for the rest of the tournament.</>
              : <><strong style={{color:"#4ade80"}}>Guideline:</strong> Day 1 limit is informational only and does not affect eligibility.</>}
          </p>
          <label style={{ ...sectionLabel, display:"block", marginBottom:4 }}>MAX PITCHES — ENTIRE TOURNAMENT (eligibility limit)</label>
          <input type="number" min="1" placeholder="115" value={maxTotal} onChange={e=>setMaxTotal(e.target.value)}
            style={{ ...inputStyle, fontSize:18, fontFamily:"'Bebas Neue',cursive", fontWeight:800, textAlign:"center" }}/>
        </div>
        <button onClick={handleSaveEdit} disabled={!name.trim()}
          style={{ ...primaryBtn, width:"100%", padding:14, opacity:name.trim()?1:0.4,
            background:"linear-gradient(135deg,#1d4ed8,#1e40af)",
            boxShadow:"0 4px 20px rgba(29,78,216,0.35)" }}>
          Save Changes
        </button>
      </div>
    );
  }

  if (view!=="list") {
    const t = tournaments.find(t=>t.id===view);
    if (!t) { return null; }
    const allEntries = roster.flatMap(p=>
      (p.history||[]).filter(h=>h.tournamentId===t.id).map(h=>({...h,playerName:p.name,jersey:p.jersey,playerId:p.id}))
    ).sort((a,b)=>a.date<b.date?-1:1);
    const byDay = {};
    allEntries.forEach(e=>{ const d=e.tourneyDay||1; if(!byDay[d]) byDay[d]=[]; byDay[d].push(e); });
    const totalPitches = allEntries.reduce((s,e)=>s+e.pitches,0);
    const uniquePlayers = [...new Map(allEntries.map(e=>[e.playerId,e])).values()];

    return (
      <div style={{ padding:"0 16px 110px" }}>
        <div style={{ display:"flex", alignItems:"center", gap:10, padding:"14px 0 18px" }}>
          <button onClick={()=>setView("list")} style={{ background:"rgba(255,255,255,0.07)", border:"none", borderRadius:10,
            padding:10, color:"rgba(255,255,255,0.7)", cursor:"pointer", display:"flex" }}>{I.back}</button>
          <div style={{ flex:1 }}>
            <h2 style={{ margin:0, fontSize:21, fontWeight:800, color:"#f8fafc", fontFamily:"'Bebas Neue',cursive", letterSpacing:1.5 }}>
              🏆 {t.name.toUpperCase()}
            </h2>
            <div style={{ fontSize:11, color:"rgba(255,255,255,0.4)" }}>{t.days}-day tournament</div>
          </div>
          <button onClick={()=>openEdit(t)}
            style={{ background:"rgba(255,255,255,0.07)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:8,
              padding:10, color:"rgba(255,255,255,0.7)", cursor:"pointer", display:"flex" }}>{I.edit}</button>
          <button onClick={()=>setConfirmDeleteTourney(true)}
            style={{ background:"rgba(244,63,94,0.1)", border:"1px solid rgba(244,63,94,0.25)", borderRadius:8,
              padding:10, color:"rgba(244,63,94,0.7)", cursor:"pointer", display:"flex" }}>{I.trash}</button>
        </div>
        {confirmDeleteTourney && (
          <div style={{ background:"rgba(244,63,94,0.08)", border:"1px solid rgba(244,63,94,0.25)",
            borderRadius:14, padding:14, marginBottom:12 }}>
            <p style={{ margin:"0 0 10px", fontSize:13, color:"#f87171", fontWeight:600, textAlign:"center" }}>
              Delete "{t.name}"? All pitch data logged for this tournament will be removed from history.
            </p>
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={()=>setConfirmDeleteTourney(false)} style={{ ...cancelBtn, flex:1 }}>Keep It</button>
              <button onClick={()=>{ onDeleteTourney(t.id); setView("list"); setConfirmDeleteTourney(false); }}
                style={{ flex:2, background:"linear-gradient(135deg,#dc2626,#b91c1c)", border:"none",
                  borderRadius:12, padding:10, color:"#fff", fontSize:13, fontWeight:700, cursor:"pointer" }}>
                Yes, Delete
              </button>
            </div>
          </div>
        )}

        <div style={card}>
          <p style={sectionLabel}>PITCH RULES</p>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:8 }}>
            <div style={{ textAlign:"center", padding:"10px 6px", background:"rgba(255,255,255,0.04)", borderRadius:10,
              border:`1px solid ${t.day1IsHardLimit?"rgba(244,63,94,0.25)":"rgba(255,255,255,0.06)"}` }}>
              <div style={{ fontSize:20, fontWeight:800, color:t.day1IsHardLimit?"#f43f5e":"#fbbf24", fontFamily:"'Bebas Neue',cursive" }}>{t.maxDay1}p</div>
              <div style={{ fontSize:10, color:"rgba(255,255,255,0.35)" }}>Day 1</div>
              <div style={{ fontSize:9, color:t.day1IsHardLimit?"rgba(244,63,94,0.6)":"rgba(255,255,255,0.2)", marginTop:1 }}>{t.day1IsHardLimit?"hard limit":"guideline"}</div>
            </div>
            <div style={{ textAlign:"center", padding:"10px 6px", background:"rgba(255,255,255,0.04)", borderRadius:10,
              border:"1px solid rgba(251,146,60,0.25)" }}>
              <div style={{ fontSize:20, fontWeight:800, color:"#fb923c", fontFamily:"'Bebas Neue',cursive" }}>{t.maxTotal}p</div>
              <div style={{ fontSize:10, color:"rgba(255,255,255,0.35)" }}>Total</div>
              <div style={{ fontSize:9, color:"rgba(255,255,255,0.2)", marginTop:1 }}>eligibility limit</div>
            </div>
          </div>
        </div>
        {allEntries.length>0 && (
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:12 }}>
            {[["Appearances",allEntries.length,"#38bdf8"],["Pitchers",uniquePlayers.length,"#a78bfa"],["Total",totalPitches+"p","#fb923c"]].map(([l,v,c])=>(
              <div key={l} style={{ textAlign:"center", padding:"12px 6px", background:"rgba(255,255,255,0.03)",
                border:"1px solid rgba(255,255,255,0.07)", borderRadius:12 }}>
                <div style={{ fontSize:22, fontWeight:900, color:c, fontFamily:"'Bebas Neue',cursive" }}>{v}</div>
                <div style={{ fontSize:10, color:"rgba(255,255,255,0.35)" }}>{l}</div>
              </div>
            ))}
          </div>
        )}
        {/* Pitcher eligibility & remaining pitches — ALL roster players */}
        <div style={card}>
          <p style={sectionLabel}>PITCHER STATUS & REMAINING PITCHES</p>
          <div style={{ display:"grid", gridTemplateColumns:t.day1IsHardLimit?"1fr auto auto":"1fr auto", gap:"4px 10px",
            fontSize:9, color:"rgba(255,255,255,0.3)", fontWeight:700, letterSpacing:1,
            paddingBottom:8, marginBottom:8, borderBottom:"1px solid rgba(255,255,255,0.07)" }}>
            <span>PITCHER</span>
            {t.day1IsHardLimit && <span style={{textAlign:"right"}}>DAY 1 REM</span>}
            <span style={{textAlign:"right"}}>TOTAL REM</span>
          </div>
          {roster.map(p=>{
            const pGames = allEntries.filter(e=>e.playerId===p.id);
            const day1Used = pGames.filter(e=>e.tourneyDay===1).reduce((s,e)=>s+e.pitches,0);
            const totalUsed = pGames.reduce((s,e)=>s+e.pitches,0);
            const day1Rem = Math.max(0, t.maxDay1 - day1Used);
            const totalRem = Math.max(0, t.maxTotal - totalUsed);
            const exceededDay1 = t.day1IsHardLimit && day1Used > t.maxDay1;
            const exceededTotal = totalUsed >= t.maxTotal;
            const ineligible = exceededDay1 || exceededTotal;
            const ineligReason = exceededTotal
              ? `Exceeded total limit (${totalUsed}/${t.maxTotal}p)`
              : exceededDay1
              ? `Exceeded Day 1 limit (${day1Used}/${t.maxDay1}p)`
              : null;

            const totalPct = Math.min(totalUsed/t.maxTotal, 1);
            const nameColor = ineligible ? "#f43f5e" : "#f8fafc";
            const day1RemColor = exceededDay1 ? "#f43f5e" : day1Rem===0 ? "rgba(255,255,255,0.3)" : day1Rem<=10 ? "#fb923c" : "#4ade80";
            const totalRemColor = exceededTotal ? "#f43f5e" : totalRem<=15 ? "#fb923c" : "#38bdf8";

            return (
              <div key={p.id} style={{ marginBottom:10, paddingBottom:10,
                borderBottom:"1px solid rgba(255,255,255,0.05)" }}>
                {/* Row: name + remaining columns */}
                <div style={{ display:"grid", gridTemplateColumns:t.day1IsHardLimit?"1fr auto auto":"1fr auto", gap:"4px 10px", alignItems:"center", marginBottom:6 }}>
                  <div style={{ minWidth:0 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                      <span style={{ fontSize:13, fontWeight:700, color:nameColor, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                        {p.jersey?`#${p.jersey} `:""}{p.name}
                      </span>
                      {ineligible && (
                        <span style={{ fontSize:9, padding:"1px 6px", background:"rgba(244,63,94,0.15)",
                          border:"1px solid rgba(244,63,94,0.3)", borderRadius:20, color:"#f43f5e", fontWeight:700, flexShrink:0 }}>
                          INELIGIBLE
                        </span>
                      )}
                      {!ineligible && pGames.length===0 && (
                        <span style={{ fontSize:9, padding:"1px 6px", background:"rgba(74,222,128,0.1)",
                          border:"1px solid rgba(74,222,128,0.2)", borderRadius:20, color:"#4ade80", fontWeight:700, flexShrink:0 }}>
                          NOT YET PITCHED
                        </span>
                      )}
                    </div>
                    {ineligReason && (
                      <div style={{ fontSize:10, color:"rgba(244,63,94,0.7)", marginTop:1 }}>{ineligReason}</div>
                    )}
                    {!ineligible && pGames.length>0 && (
                      <div style={{ fontSize:10, color:"rgba(255,255,255,0.3)", marginTop:1 }}>
                        {totalUsed}p used of {t.maxTotal}p total
                      </div>
                    )}
                    {!ineligible && !t.day1IsHardLimit && day1Used>0 && day1Used>t.maxDay1 && (
                      <div style={{ fontSize:10, color:"rgba(251,191,36,0.7)", marginTop:1 }}>
                        ⚠ Day 1: {day1Used}/{t.maxDay1}p (over guideline)
                      </div>
                    )}
                  </div>
                  {t.day1IsHardLimit && (
                    <div style={{ textAlign:"right", minWidth:56 }}>
                      <div style={{ fontSize:15, fontWeight:800, color:day1RemColor, fontFamily:"'Bebas Neue',cursive", lineHeight:1 }}>
                        {exceededDay1 ? "—" : `${day1Rem}p`}
                      </div>
                      <div style={{ fontSize:9, color:"rgba(255,255,255,0.25)" }}>Day 1</div>
                    </div>
                  )}
                  <div style={{ textAlign:"right", minWidth:56 }}>
                    <div style={{ fontSize:15, fontWeight:800, color:totalRemColor, fontFamily:"'Bebas Neue',cursive", lineHeight:1 }}>
                      {exceededTotal ? "0p" : `${totalRem}p`}
                    </div>
                    <div style={{ fontSize:9, color:"rgba(255,255,255,0.25)" }}>Total</div>
                  </div>
                </div>
                {/* Progress bar: total pitches used */}
                <div style={{ height:4, background:"rgba(255,255,255,0.06)", borderRadius:4 }}>
                  <div style={{ height:"100%", width:`${totalPct*100}%`, borderRadius:4,
                    background:ineligible?"#f43f5e":totalPct>=0.8?"#fb923c":"#38bdf8", transition:"width 0.3s" }}/>
                </div>
              </div>
            );
          })}
        </div>
        {Object.keys(byDay).length>0 && (
          <div style={card}>
            <p style={sectionLabel}>GAME LOG BY DAY</p>
            {Array.from({length:t.days},(_,i)=>i+1).map(day=>{
              const dayEntries = byDay[day]||[];
              const day1Label = day===1 ? `${t.maxDay1}p ${t.day1IsHardLimit?"hard limit":"guideline"}` : null;
              return (
                <div key={day} style={{ marginBottom:day<t.days?16:0 }}>
                  <div style={{ fontSize:13, fontWeight:700, color:"#f59e0b", marginBottom:8, display:"flex", alignItems:"center", gap:6 }}>
                    <div style={{ width:22, height:22, borderRadius:6, background:"rgba(245,158,11,0.15)",
                      border:"1px solid rgba(245,158,11,0.3)", display:"flex", alignItems:"center", justifyContent:"center",
                      fontSize:11, fontWeight:800, color:"#f59e0b" }}>{day}</div>
                    Day {day} {day1Label && <span style={{ fontWeight:400, color:"rgba(255,255,255,0.4)", fontSize:12 }}>({day1Label})</span>}
                    {dayEntries.length===0 && <span style={{ color:"rgba(255,255,255,0.3)", fontWeight:400 }}>— No entries</span>}
                  </div>
                  {dayEntries.map((e,i)=>{
                    const rd = getRegRestDays(e.pitches);
                    return (
                      <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
                        padding:"8px 10px", background:"rgba(255,255,255,0.02)", borderRadius:10, marginBottom:5 }}>
                        <div>
                          <div style={{ fontSize:13, color:"#f8fafc", fontWeight:600 }}>{e.jersey?`#${e.jersey} `:""}{e.playerName}</div>
                          <div style={{ fontSize:11, color:"rgba(255,255,255,0.35)" }}>
                            {formatDate(e.date)}{e.opponent?` · vs ${e.opponent}`:""}
                            {day===1 && e.pitches>t.maxDay1 && <span style={{ color:t.day1IsHardLimit?"#f43f5e":"#fb923c", marginLeft:4 }}>⚠ over Day 1 {t.day1IsHardLimit?"limit":"guideline"}</span>}
                          </div>
                        </div>
                        <div style={{ textAlign:"right" }}>
                          <div style={{ fontSize:17, fontWeight:800, color:(day===1&&e.pitches>t.maxDay1)?"#fb923c":"#38bdf8", fontFamily:"'Bebas Neue',cursive" }}>{e.pitches}p</div>
                          <div style={{ fontSize:11, color:rd===0?"#4ade80":rd<=2?"#fb923c":"#f43f5e", fontWeight:600 }}>{rd===0?"No rest":`${rd}d`}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        )}
        {allEntries.length===0 && (
          <div style={{ textAlign:"center", padding:"30px 0", color:"rgba(255,255,255,0.3)" }}>
            <p style={{ fontSize:13 }}>No pitches logged for this tournament yet.</p>
          </div>
        )}
      </div>
    );
  }

  return (
    <div style={{ padding:"0 16px 110px" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"16px 0 14px" }}>
        <div>
          <h2 style={{ margin:0, fontSize:24, fontWeight:800, color:"#f8fafc", fontFamily:"'Bebas Neue',cursive", letterSpacing:2 }}>TOURNAMENTS</h2>
          <p style={{ margin:0, fontSize:12, color:"rgba(255,255,255,0.4)" }}>{tournaments.length} configured</p>
        </div>
        <button onClick={()=>setView("create")} style={{ display:"flex", alignItems:"center", gap:6, padding:"8px 14px",
          background:"linear-gradient(135deg,#d97706,#b45309)", border:"none", borderRadius:20,
          color:"#fff", fontSize:13, fontWeight:700, cursor:"pointer", boxShadow:"0 2px 12px rgba(217,119,6,0.35)" }}>
          {I.plus} New
        </button>
      </div>
      {tournaments.length===0 ? (
        <div style={{ textAlign:"center", padding:"60px 0", color:"rgba(255,255,255,0.2)" }}>
          <div style={{ fontSize:56, marginBottom:12 }}>🏆</div>
          <p style={{ fontSize:15, fontWeight:600 }}>No tournaments yet</p>
          <p style={{ fontSize:13 }}>Tap "New" to configure a tournament with custom pitch rules</p>
        </div>
      ) : tournaments.map(t=>{
        const entries = roster.flatMap(p=>(p.history||[]).filter(h=>h.tournamentId===t.id));
        const players = new Set(entries.map(e=>e.playerId||"?")).size;
        return (
          <div key={t.id} onClick={()=>setView(t.id)}
            style={{ display:"flex", alignItems:"center", gap:12, padding:14, marginBottom:8,
              background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)",
              borderLeft:"3px solid #f59e0b", borderRadius:14, cursor:"pointer" }}>
            <div style={{ width:42, height:42, borderRadius:11, background:"rgba(245,158,11,0.12)",
              border:"1px solid rgba(245,158,11,0.3)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, flexShrink:0 }}>🏆</div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:15, fontWeight:700, color:"#f8fafc" }}>{t.name}</div>
              <div style={{ fontSize:12, color:"rgba(255,255,255,0.4)" }}>
                {t.days} day{t.days!==1?"s":""} · Day 1: {t.maxDay1}p {t.day1IsHardLimit?"(hard limit)":"(guideline)"} · {t.maxTotal}p total
              </div>
              {entries.length>0 && <div style={{ fontSize:11, color:"rgba(255,255,255,0.3)", marginTop:1 }}>{entries.length} appearances · {players} pitcher{players!==1?"s":""}</div>}
            </div>
            <div style={{ color:"rgba(255,255,255,0.2)" }}>{I.chevron}</div>
          </div>
        );
      })}
    </div>
  );
}

// SCREEN: SEASON HISTORY — with pitcher filter
// ══════════════════════════════════════════════════════════════════════════════
function SeasonHistory({ roster, tournaments, onEditGame, onDeleteGame }) {
  const [year, setYear] = useState(new Date().getFullYear().toString());
  const [filterPitcherId, setFilterPitcherId] = useState("all");
  const [editingEntry, setEditingEntry] = useState(null);

  const years = [...new Set(roster.flatMap(p=>(p.history||[]).map(h=>h.date.slice(0,4))))].sort().reverse();
  const displayYear = years.includes(year) ? year : (years[0]||year);

  // All games for this year, optionally filtered
  const allGames = roster.flatMap(p=>
    (p.history||[]).filter(h=>h.date.startsWith(displayYear)).map(h=>({...h, playerName:p.name, jersey:p.jersey, pitcherId:p.id}))
  ).sort((a,b)=>b.date<a.date?-1:1);

  const filteredGames = filterPitcherId==="all"
    ? allGames
    : allGames.filter(g=>String(g.pitcherId)===String(filterPitcherId));

  const totalPitches = filteredGames.reduce((s,g)=>s+g.pitches,0);
  const distinctGameCount = new Set(filteredGames.map(g=>g.date)).size;

  const pitchersWithGames = roster.filter(p=>(p.history||[]).some(h=>h.date.startsWith(displayYear)));

  const leaderboard = roster.map(p=>{
    const games = (p.history||[]).filter(h=>h.date.startsWith(displayYear));
    return { id:p.id, name:p.name, jersey:p.jersey, games:games.length,
      total:games.reduce((s,g)=>s+g.pitches,0),
      avg:games.length?Math.round(games.reduce((s,g)=>s+g.pitches,0)/games.length):0,
      high:games.reduce((m,g)=>Math.max(m,g.pitches),0) };
  }).filter(p=>p.games>0).sort((a,b)=>b.total-a.total);

  const activePitcher = filterPitcherId!=="all" ? roster.find(p=>String(p.id)===String(filterPitcherId)) : null;

  return (
    <div style={{ padding:"0 16px 110px" }}>
      {editingEntry && (
        <EditGameModal
          entry={editingEntry}
          pitcherName={editingEntry.playerName}
          roster={roster}
          tournaments={[]}
          onSave={updated=>{ onEditGame(editingEntry.pitcherId, updated.gameId, updated); setEditingEntry(null); }}
          onDelete={()=>{ onDeleteGame(editingEntry.pitcherId, editingEntry.gameId); setEditingEntry(null); }}
          onClose={()=>setEditingEntry(null)}/>
      )}

      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"16px 0 14px" }}>
        <div>
          <h2 style={{ margin:0, fontSize:24, fontWeight:800, color:"#f8fafc", fontFamily:"'Bebas Neue',cursive", letterSpacing:2 }}>HISTORY</h2>
          <p style={{ margin:0, fontSize:12, color:"rgba(255,255,255,0.4)" }}>{distinctGameCount} game{distinctGameCount!==1?"s":""} · {filteredGames.length} appearance{filteredGames.length!==1?"s":""}</p>
        </div>
        {years.length>1 && (
          <select value={displayYear} onChange={e=>setYear(e.target.value)}
            style={{ background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.1)",
              borderRadius:10, padding:"6px 10px", color:"#f8fafc", fontSize:14 }}>
            {years.map(y=><option key={y} value={y}>{y}</option>)}
          </select>
        )}
      </div>

      {/* Pitcher filter */}
      {pitchersWithGames.length > 1 && (
        <div style={card}>
          <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:8 }}>
            {I.filter}
            <p style={{ ...sectionLabel, margin:0 }}>FILTER BY PITCHER</p>
          </div>
          <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
            <button onClick={()=>setFilterPitcherId("all")}
              style={{ padding:"6px 12px", borderRadius:20,
                border:`1px solid ${filterPitcherId==="all"?"#38bdf8":"rgba(255,255,255,0.1)"}`,
                background:filterPitcherId==="all"?"rgba(56,189,248,0.15)":"rgba(255,255,255,0.04)",
                color:filterPitcherId==="all"?"#38bdf8":"rgba(255,255,255,0.5)",
                fontSize:12, fontWeight:700, cursor:"pointer" }}>
              All Pitchers
            </button>
            {pitchersWithGames.map(p=>(
              <button key={p.id} onClick={()=>setFilterPitcherId(String(p.id))}
                style={{ padding:"6px 12px", borderRadius:20,
                  border:`1px solid ${String(filterPitcherId)===String(p.id)?"#38bdf8":"rgba(255,255,255,0.1)"}`,
                  background:String(filterPitcherId)===String(p.id)?"rgba(56,189,248,0.15)":"rgba(255,255,255,0.04)",
                  color:String(filterPitcherId)===String(p.id)?"#38bdf8":"rgba(255,255,255,0.5)",
                  fontSize:12, fontWeight:700, cursor:"pointer" }}>
                {p.jersey?`#${p.jersey} `:""}{p.name}
              </button>
            ))}
          </div>
        </div>
      )}

      {filteredGames.length===0 ? (
        <div style={{ textAlign:"center", padding:"60px 0", color:"rgba(255,255,255,0.2)" }}>
          <div style={{ fontSize:56, marginBottom:12 }}>📊</div>
          <p style={{ fontSize:15, fontWeight:600 }}>
            {filterPitcherId==="all" ? `No games logged for ${displayYear}` : `No games for ${activePitcher?.name} in ${displayYear}`}
          </p>
        </div>
      ) : (
        <>
          {/* Summary stats */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8, marginBottom:12 }}>
            {[["Total",totalPitches+"p","#38bdf8"],
              ["Games",distinctGameCount,"#4ade80"],
              ["Tourney",new Set(filteredGames.filter(g=>g.isTournament).map(g=>g.date)).size,"#f59e0b"]
            ].map(([l,v,c])=>(
              <div key={l} style={{ textAlign:"center", padding:"12px 6px", background:"rgba(255,255,255,0.03)",
                border:"1px solid rgba(255,255,255,0.07)", borderRadius:12 }}>
                <div style={{ fontSize:22, fontWeight:900, color:c, fontFamily:"'Bebas Neue',cursive" }}>{v}</div>
                <div style={{ fontSize:10, color:"rgba(255,255,255,0.35)" }}>{l}</div>
              </div>
            ))}
          </div>

          {/* Leaderboard — only when showing all pitchers */}
          {filterPitcherId==="all" && leaderboard.length>0 && (
            <div style={card}>
              <p style={sectionLabel}>LEADERBOARD</p>
              {/* Single grid so header and every row share the same column widths */}
              <div style={{ display:"grid", gridTemplateColumns:"1fr 54px 48px 54px", columnGap:8,
                marginBottom:6, paddingBottom:6, borderBottom:"1px solid rgba(255,255,255,0.07)" }}>
                <span style={{ fontSize:10, color:"rgba(255,255,255,0.35)", fontWeight:700, letterSpacing:1 }}>PLAYER</span>
                <span style={{ fontSize:10, color:"rgba(255,255,255,0.35)", fontWeight:700, letterSpacing:1, textAlign:"right" }}>GAMES</span>
                <span style={{ fontSize:10, color:"rgba(255,255,255,0.35)", fontWeight:700, letterSpacing:1, textAlign:"right" }}>AVG</span>
                <span style={{ fontSize:10, color:"rgba(255,255,255,0.35)", fontWeight:700, letterSpacing:1, textAlign:"right" }}>TOT</span>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 54px 48px 54px", columnGap:8 }}>
                {leaderboard.map((p,i)=>(
                  <React.Fragment key={p.id}>
                    <div onClick={()=>setFilterPitcherId(String(p.id))}
                      style={{ display:"flex", alignItems:"center", gap:7, cursor:"pointer",
                        padding:"7px 0", borderBottom:i<leaderboard.length-1?"1px solid rgba(255,255,255,0.04)":"none" }}>
                      <span style={{ width:20, height:20, borderRadius:6,
                        background:i===0?"rgba(251,191,36,0.2)":i===1?"rgba(156,163,175,0.15)":i===2?"rgba(180,120,60,0.15)":"rgba(255,255,255,0.04)",
                        display:"flex", alignItems:"center", justifyContent:"center",
                        fontSize:10, fontWeight:800, color:i===0?"#fbbf24":i===1?"#9ca3af":i===2?"#b47a3c":"rgba(255,255,255,0.3)", flexShrink:0 }}>
                        {i+1}
                      </span>
                      <span style={{ fontSize:13, color:"rgba(255,255,255,0.8)", fontWeight:600, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{p.jersey?`#${p.jersey} `:""}{p.name}</span>
                    </div>
                    <span onClick={()=>setFilterPitcherId(String(p.id))} style={{ fontSize:13, color:"rgba(255,255,255,0.5)", fontFamily:"'DM Mono',monospace", textAlign:"right", cursor:"pointer",
                      padding:"7px 0", borderBottom:i<leaderboard.length-1?"1px solid rgba(255,255,255,0.04)":"none", display:"flex", alignItems:"center", justifyContent:"flex-end" }}>{p.games}</span>
                    <span onClick={()=>setFilterPitcherId(String(p.id))} style={{ fontSize:13, color:"#38bdf8", fontFamily:"'DM Mono',monospace", textAlign:"right", cursor:"pointer",
                      padding:"7px 0", borderBottom:i<leaderboard.length-1?"1px solid rgba(255,255,255,0.04)":"none", display:"flex", alignItems:"center", justifyContent:"flex-end" }}>{p.avg}p</span>
                    <span onClick={()=>setFilterPitcherId(String(p.id))} style={{ fontSize:13, color:"#f8fafc", fontFamily:"'DM Mono',monospace", fontWeight:700, textAlign:"right", cursor:"pointer",
                      padding:"7px 0", borderBottom:i<leaderboard.length-1?"1px solid rgba(255,255,255,0.04)":"none", display:"flex", alignItems:"center", justifyContent:"flex-end" }}>{p.total}p</span>
                  </React.Fragment>
                ))}
              </div>
              <p style={{ margin:"8px 0 0", fontSize:10, color:"rgba(255,255,255,0.25)" }}>Tap a player to filter their games</p>
            </div>
          )}

          {/* Filtered pitcher summary */}
          {activePitcher && (
            <div style={{ ...card, border:"1px solid rgba(56,189,248,0.2)", background:"rgba(56,189,248,0.04)" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div>
                  <div style={{ fontSize:15, fontWeight:800, color:"#38bdf8" }}>{activePitcher.jersey?`#${activePitcher.jersey} `:""}{activePitcher.name}</div>
                  <div style={{ fontSize:12, color:"rgba(255,255,255,0.4)", marginTop:2 }}>
                    {distinctGameCount} game{distinctGameCount!==1?"s":""} · {totalPitches}p total · avg {distinctGameCount?Math.round(totalPitches/distinctGameCount):0}p/game
                  </div>
                </div>
                <Chip status={getAvailabilityStatus(activePitcher, null, tournaments)} size="lg"/>
              </div>
            </div>
          )}

          {/* All appearances — editable */}
          <div style={card}>
            <p style={sectionLabel}>APPEARANCES — TAP TO EDIT</p>
            {filteredGames.map((g,i)=>{
              const rd = getRegRestDays(g.pitches);
              return (
                <div key={g.gameId||i} onClick={()=>setEditingEntry(g)}
                  style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
                    padding:"10px 10px", borderRadius:10, marginBottom:4, cursor:"pointer",
                    background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.05)" }}
                  onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.05)"}
                  onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,0.02)"}>
                  <div>
                    <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                      {filterPitcherId==="all" && (
                        <span style={{ fontSize:13, fontWeight:700, color:"rgba(255,255,255,0.85)" }}>
                          {g.jersey?`#${g.jersey} `:""}{g.playerName}
                        </span>
                      )}
                      {g.isTournament && <span style={{ fontSize:9, padding:"1px 5px", background:"rgba(245,158,11,0.15)",
                        border:"1px solid rgba(245,158,11,0.25)", borderRadius:6, color:"#f59e0b", fontWeight:700 }}>
                        {g.tournamentName||"TOURNEY"}{g.tourneyDay?` D${g.tourneyDay}`:""}
                      </span>}
                    </div>
                    <div style={{ fontSize:11, color:"rgba(255,255,255,0.35)" }}>
                      {formatDate(g.date)}{g.opponent?` · vs ${g.opponent}`:""}
                    </div>
                  </div>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <div style={{ textAlign:"right" }}>
                      <div style={{ fontSize:15, fontWeight:800, color:"#f8fafc", fontFamily:"'Bebas Neue',cursive" }}>{g.pitches}p</div>
                      <div style={{ fontSize:11, color:rd===0?"#4ade80":rd<=1?"#a3e635":rd<=2?"#fb923c":"#f43f5e", fontWeight:600 }}>
                        {rd===0?"No rest":`${rd}d`}
                      </div>
                    </div>
                    <div style={{ color:"rgba(255,255,255,0.3)" }}>{I.edit}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}

// TEAM PICKER — Select or create a team
// ══════════════════════════════════════════════════════════════════════════════
function TeamPickerScreen({ onSelect, showManage }) {
  const [teams, setTeams]       = useState([]);
  const [loading, setLoading]   = useState(true);
  const [creating, setCreating] = useState(false);
  const [managing, setManaging] = useState(null); // team object being managed
  const [newName, setNewName]   = useState("");
  const [newRules, setNewRules] = useState({ ...DEFAULT_RULES });
  const [saving, setSaving]     = useState(false);
  const [renameName, setRenameName] = useState("");
  const [deletePhase, setDeletePhase] = useState("idle"); // idle | confirm | type
  const [deleteText, setDeleteText]   = useState("");

  useEffect(() => {
    window.__fbMigrateIfNeeded().then(() =>
      window.__fbListTeams().then(list => { setTeams(list); setLoading(false); })
    );
  }, []);

  function refreshTeams() {
    window.__fbListTeams().then(list => setTeams(list));
  }

  function handleCreate() {
    if (!newName.trim() || saving) return;
    const rules = {
      maxPitches: Math.max(1, parseInt(newRules.maxPitches)||55),
      rest1: Math.max(0, parseInt(newRules.rest1)||20),
      rest2: Math.max(0, parseInt(newRules.rest2)||40),
      rest3: Math.max(0, parseInt(newRules.rest3)||60),
    };
    const teamId = newId();
    const meta   = { name: newName.trim(), rules, createdAt: todayStr() };
    setSaving(true);
    window.__fbCreateTeam(teamId, meta).then(() => {
      setSaving(false);
      setCreating(false);
      setNewName("");
      setNewRules({ ...DEFAULT_RULES });
      onSelect(teamId, meta);
    }).catch(() => setSaving(false));
  }

  function handleRename() {
    if (!renameName.trim() || !managing) return;
    const updated = { ...managing, name: renameName.trim() };
    window.__fbUpdateTeamMeta(managing.id, { name: renameName.trim() }).then(() => {
      refreshTeams();
      setManaging(null);
    });
  }

  function handleDelete() {
    if (deleteText !== "DELETE TEAM" || !managing) return;
    window.__fbDeleteTeam(managing.id).then(() => {
      refreshTeams();
      setManaging(null);
      setDeletePhase("idle");
      setDeleteText("");
    });
  }

  const ruleField = (label, key, hint) => (
    <div style={{ marginBottom:10 }}>
      <label style={{ ...sectionLabel, display:"block", marginBottom:4 }}>{label}</label>
      <input type="number" min="0" value={newRules[key]}
        onChange={e=>setNewRules(r=>({...r,[key]:e.target.value}))}
        style={{ ...inputStyle, marginBottom:2 }}/>
      {hint && <div style={{ fontSize:11, color:"rgba(255,255,255,0.35)" }}>{hint}</div>}
    </div>
  );

  return (
    <div style={{ background:"#080c14", minHeight:"100vh", padding:"0 16px 40px",
      fontFamily:"'Barlow',sans-serif", color:"#f8fafc",
      backgroundImage:"radial-gradient(ellipse at 20% 0%,rgba(30,58,138,0.25) 0%,transparent 60%)" }}>

      {/* Header */}
      <div style={{ padding:"32px 0 20px", display:"flex", alignItems:"center", gap:14 }}>
        <div style={{ width:52, height:52, borderRadius:"50%", background:"#111",
          border:"3px solid #90c4e4", display:"flex", alignItems:"center", justifyContent:"center",
          fontSize:26, fontWeight:900, color:"white", flexShrink:0 }}>P</div>
        <div>
          <div style={{ fontSize:26, fontWeight:900, color:"#f8fafc", fontFamily:"'Bebas Neue',cursive", letterSpacing:2, lineHeight:1 }}>PRIME PITCHING</div>
          <div style={{ fontSize:12, color:"rgba(255,255,255,0.4)", marginTop:2 }}>
            {showManage ? "Switch or manage teams" : "Select your team to get started"}
          </div>
        </div>
      </div>

      {/* Team list */}
      {loading ? (
        <div style={{ textAlign:"center", padding:"40px 0", color:"rgba(255,255,255,0.3)", fontSize:14 }}>Loading teams…</div>
      ) : (
        <div style={{ ...card, marginBottom:12 }}>
          <p style={sectionLabel}>TEAMS</p>
          {teams.length === 0 && (
            <div style={{ fontSize:13, color:"rgba(255,255,255,0.3)", paddingBottom:4 }}>No teams yet — create one below.</div>
          )}
          {teams.map(t => (
            <div key={t.id} style={{ display:"flex", alignItems:"center", gap:8, padding:"10px 0",
              borderBottom:"1px solid rgba(255,255,255,0.05)" }}>
              <button onClick={()=>onSelect(t.id, t)}
                style={{ flex:1, textAlign:"left", background:"transparent", border:"none",
                  cursor:"pointer", padding:0 }}>
                <div style={{ fontSize:15, fontWeight:700, color:"#f8fafc" }}>{t.name}</div>
                <div style={{ fontSize:11, color:"rgba(255,255,255,0.35)", marginTop:2 }}>
                  Max {t.rules?.maxPitches||55}p · Rest: {t.rules?.rest1||20}/{t.rules?.rest2||40}/{t.rules?.rest3||60}
                </div>
              </button>
              <button onClick={()=>{ setManaging(t); setRenameName(t.name); setDeletePhase("idle"); setDeleteText(""); }}
                style={{ background:"rgba(255,255,255,0.07)", border:"1px solid rgba(255,255,255,0.1)",
                  borderRadius:8, padding:"5px 10px", color:"rgba(255,255,255,0.5)", cursor:"pointer", fontSize:12 }}>
                ···
              </button>
            </div>
          ))}
        </div>
      )}

      {/* Create new team */}
      {!creating ? (
        <button onClick={()=>setCreating(true)}
          style={{ ...primaryBtn, width:"100%", marginBottom:16 }}>
          + Create New Team
        </button>
      ) : (
        <div style={{ ...card, border:"1px solid rgba(56,189,248,0.2)", marginBottom:16 }}>
          <p style={{ ...sectionLabel, color:"#38bdf8" }}>NEW TEAM</p>
          <div style={{ marginBottom:10 }}>
            <label style={{ ...sectionLabel, display:"block", marginBottom:4 }}>TEAM NAME</label>
            <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="e.g. Prime 10U"
              style={inputStyle}/>
          </div>
          <p style={{ ...sectionLabel, marginTop:14, marginBottom:10 }}>PITCH COUNT RULES</p>
          {ruleField("Game max pitches", "maxPitches", "Maximum pitches allowed per game")}
          {ruleField("0→1 rest-day breakpoint", "rest1", "Pitches above this require 1 day rest")}
          {ruleField("1→2 rest-day breakpoint", "rest2", "Pitches above this require 2 days rest")}
          {ruleField("2→3 rest-day breakpoint", "rest3", "Pitches above this require 3 days rest")}
          <div style={{ display:"flex", gap:8, marginTop:4 }}>
            <button onClick={()=>{ setCreating(false); setNewName(""); setNewRules({...DEFAULT_RULES}); }} style={cancelBtn}>Cancel</button>
            <button onClick={handleCreate} disabled={!newName.trim()||saving}
              style={{ ...primaryBtn, flex:2, opacity:!newName.trim()||saving?0.5:1 }}>
              {saving ? "Creating…" : "Create Team"}
            </button>
          </div>
        </div>
      )}

      {/* Manage modal */}
      {managing && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.8)", zIndex:60,
          display:"flex", alignItems:"flex-end", justifyContent:"center" }}
          onClick={e=>{ if(e.target===e.currentTarget){ setManaging(null); setDeletePhase("idle"); setDeleteText(""); } }}>
          <div style={{ width:"100%", maxWidth:430, background:"#0f1623",
            border:"1px solid rgba(255,255,255,0.12)", borderRadius:"20px 20px 0 0",
            padding:"20px 18px 48px" }}>

            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:18 }}>
              <div style={{ fontSize:16, fontWeight:800, color:"#f8fafc" }}>{managing.name}</div>
              <button onClick={()=>{ setManaging(null); setDeletePhase("idle"); setDeleteText(""); }}
                style={{ background:"rgba(255,255,255,0.07)", border:"none", borderRadius:8,
                  width:32, height:32, color:"rgba(255,255,255,0.5)", cursor:"pointer" }}>✕</button>
            </div>

            {deletePhase === "idle" && (
              <>
                <div style={{ ...card, border:"1px solid rgba(56,189,248,0.2)", marginBottom:12 }}>
                  <p style={{ ...sectionLabel, color:"#38bdf8" }}>RENAME</p>
                  <input value={renameName} onChange={e=>setRenameName(e.target.value)} style={{ ...inputStyle, marginBottom:10 }}/>
                  <button onClick={handleRename} disabled={!renameName.trim()}
                    style={{ ...primaryBtn, width:"100%", opacity:!renameName.trim()?0.5:1 }}>Save Name</button>
                </div>
                <div style={{ ...card, border:"1px solid rgba(244,63,94,0.2)" }}>
                  <p style={{ ...sectionLabel, color:"#f43f5e" }}>DANGER ZONE</p>
                  <button onClick={()=>setDeletePhase("confirm")}
                    style={{ ...primaryBtn, width:"100%", background:"linear-gradient(135deg,#dc2626,#b91c1c)",
                      boxShadow:"0 3px 14px rgba(220,38,38,0.35)" }}>
                    Delete Team
                  </button>
                </div>
              </>
            )}

            {deletePhase === "confirm" && (
              <div style={{ ...card, border:"1px solid rgba(244,63,94,0.3)" }}>
                <p style={{ fontSize:14, color:"#f87171", fontWeight:700, marginBottom:8 }}>
                  Delete "{managing.name}"?
                </p>
                <p style={{ fontSize:13, color:"rgba(255,255,255,0.5)", marginBottom:16, lineHeight:1.5 }}>
                  All roster and game history will be archived. This cannot be undone from the app.
                  Type <strong style={{color:"#f87171"}}>DELETE TEAM</strong> to confirm.
                </p>
                <input value={deleteText} onChange={e=>setDeleteText(e.target.value)}
                  placeholder="DELETE TEAM" style={{ ...inputStyle, marginBottom:10 }}/>
                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={()=>{ setDeletePhase("idle"); setDeleteText(""); }} style={cancelBtn}>Cancel</button>
                  <button onClick={handleDelete} disabled={deleteText !== "DELETE TEAM"}
                    style={{ ...primaryBtn, flex:2, background:"linear-gradient(135deg,#dc2626,#b91c1c)",
                      opacity:deleteText!=="DELETE TEAM"?0.4:1 }}>
                    Confirm Delete
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ROOT APP
// ══════════════════════════════════════════════════════════════════════════════
const TABS = [
  { id:"roster",      label:"Roster",      icon:I.roster      },
  { id:"gamelog",     label:"Game Log",    icon:I.gamelog     },
  { id:"eligibility", label:"Eligibility", icon:I.eligibility },
  { id:"tournament",  label:"Tourney",     icon:I.tournament  },
  { id:"history",     label:"History",     icon:I.history     },
];

const TEAM_ID_KEY = "pt_selected_team_id";
const TEAM_META_KEY = "pt_selected_team_meta";

function App() {
  // ── Team selection ──────────────────────────────────────────────────────
  const [teamId,   setTeamId]   = useState(() => localStorage.getItem(TEAM_ID_KEY) || null);
  const [teamMeta, setTeamMeta] = useState(() => {
    try { return JSON.parse(localStorage.getItem(TEAM_META_KEY)) || null; } catch { return null; }
  });
  const [showTeamPicker, setShowTeamPicker] = useState(false);

  // Apply team rules globally whenever team changes
  useEffect(() => {
    setCurrentRules(teamMeta?.rules || DEFAULT_RULES);
  }, [teamMeta]);

  function selectTeam(id, meta) {
    localStorage.setItem(TEAM_ID_KEY, id);
    localStorage.setItem(TEAM_META_KEY, JSON.stringify(meta));
    setCurrentRules(meta?.rules || DEFAULT_RULES);
    setTeamId(id);
    setTeamMeta(meta);
    setShowTeamPicker(false);
    // Reset app data for the new team
    setRoster([]);
    setTournaments([]);
    setLoaded(false);
    setTab("roster");
    setSelectedPlayer(null);
  }

  // ── App data ────────────────────────────────────────────────────────────
  const [roster,      setRoster]      = useState([]);
  const [tournaments, setTournaments] = useState([]);
  const [tab,         setTab]         = useState("roster");
  const [selectedPlayer, setSelectedPlayer] = useState(null);
  const [loaded,      setLoaded]      = useState(false);
  const [syncStatus,  setSyncStatus]  = useState("connecting");

  // Firebase real-time listener — re-subscribes when teamId changes
  useEffect(()=>{
    if (!teamId || !window.__fbSubscribe) {
      setLoaded(true);
      setSyncStatus(teamId ? "offline" : "connecting");
      return;
    }
    setSyncStatus("connecting");
    setLoaded(false);
    const unsub = window.__fbSubscribe(
      (data) => {
        setRoster(data.roster || []);
        setTournaments(data.tournaments || []);
        setLoaded(true);
        setSyncStatus("synced");
      },
      () => setSyncStatus(prev => prev === "connecting" ? prev : "synced"),
      () => setSyncStatus("offline"),
      teamId
    );
    return () => unsub && unsub();
  }, [teamId]);

  // Write to Firebase whenever data changes (after initial load)
  const saveTimeoutRef = useRef(null);
  useEffect(()=>{
    if (!loaded || !teamId || !window.__fbSet) return;
    setSyncStatus("saving");
    clearTimeout(saveTimeoutRef.current);
    saveTimeoutRef.current = setTimeout(() => {
      Promise.all([
        window.__fbSet("roster", roster, teamId),
        window.__fbSet("tournaments", tournaments, teamId),
      ]).then(() => setSyncStatus("synced"))
        .catch(() => setSyncStatus("offline"));
    }, 600);
  }, [roster, tournaments, loaded]);

  const addPlayer    = useCallback(p=>setRoster(r=>[...r,p]), []);
  const deletePlayer = useCallback(id=>{ setRoster(r=>r.filter(p=>p.id!==id)); setSelectedPlayer(null); }, []);

  const editPlayer = useCallback((id, updates) => {
    setRoster(r=>r.map(p=>p.id===id ? {...p,...updates} : p));
    setSelectedPlayer(prev=>prev&&prev.id===id ? {...prev,...updates} : prev);
  }, []);

  const addTourney    = useCallback(t=>setTournaments(ts=>[...ts,t]), []);
  const deleteTourney = useCallback(id=>setTournaments(ts=>ts.filter(t=>t.id!==id)), []);
  const updateTourney = useCallback(t=>setTournaments(ts=>ts.map(x=>x.id===t.id?t:x)), []);

  const logGame = useCallback((playerId, gameData) => {
    const entry = { ...gameData, gameId: gameData.gameId || newId() };
    setRoster(r=>r.map(p=>{
      if(p.id!==playerId) return p;
      const history = [...(p.history||[]), entry];
      return { ...p, ...recomputeLast(history), history };
    }));
    setSelectedPlayer(prev=>{
      if(!prev||prev.id!==playerId) return prev;
      const history = [...(prev.history||[]), entry];
      return { ...prev, ...recomputeLast(history), history };
    });
  }, []);

  const logMultiple = useCallback((playerId, gameData) => {
    const entry = { ...gameData, gameId: gameData.gameId || newId() };
    setRoster(r=>r.map(p=>{
      if(p.id!==playerId) return p;
      const history = [...(p.history||[]), entry];
      return { ...p, ...recomputeLast(history), history };
    }));
  }, []);

  const editGame = useCallback((playerId, gameId, updatedData) => {
    setRoster(r=>r.map(p=>{
      if(p.id!==playerId) return p;
      const history = (p.history||[]).map(h=>h.gameId===gameId ? {...h,...updatedData} : h);
      return { ...p, ...recomputeLast(history), history };
    }));
    setSelectedPlayer(prev=>{
      if(!prev||prev.id!==playerId) return prev;
      const history = (prev.history||[]).map(h=>h.gameId===gameId ? {...h,...updatedData} : h);
      return { ...prev, ...recomputeLast(history), history };
    });
  }, []);

  const deleteGame = useCallback((playerId, gameId) => {
    setRoster(r=>r.map(p=>{
      if(p.id!==playerId) return p;
      const history = (p.history||[]).filter(h=>h.gameId!==gameId);
      return { ...p, ...recomputeLast(history), history };
    }));
    setSelectedPlayer(prev=>{
      if(!prev||prev.id!==playerId) return prev;
      const history = (prev.history||[]).filter(h=>h.gameId!==gameId);
      return { ...prev, ...recomputeLast(history), history };
    });
  }, []);

  // ── Team picker screen ──────────────────────────────────────────────────
  if (!teamId || showTeamPicker) {
    return <TeamPickerScreen onSelect={selectTeam} showManage={showTeamPicker}/>;
  }

  // ── Loading splash ──────────────────────────────────────────────────────
  if (!loaded) return (
    <div style={{ background:"#080c14", minHeight:"100vh", display:"flex", flexDirection:"column",
      alignItems:"center", justifyContent:"center", gap:16 }}>
      <div style={{ width:64, height:64, borderRadius:"50%", background:"#111",
        border:"4px solid #90c4e4", display:"flex", alignItems:"center", justifyContent:"center",
        fontSize:30, fontWeight:900, color:"white" }}>P</div>
      <div style={{ fontSize:20, fontWeight:800, color:"rgba(255,255,255,0.85)", fontFamily:"'Bebas Neue',cursive", letterSpacing:2 }}>PRIME PITCHING</div>
      <div style={{ fontSize:13, color:"rgba(255,255,255,0.4)", marginTop:-8 }}>{teamMeta?.name}</div>
      <div className="spinner" style={{ fontSize:22, marginTop:4 }}>⟳</div>
      <div style={{ fontSize:12, color:"rgba(255,255,255,0.25)", marginTop:-8 }}>Connecting…</div>
    </div>
  );

  const availableCount = roster.filter(p=>getAvailabilityStatus(p, null, tournaments)==="available").length;
  const restingCount   = roster.filter(p=>getAvailabilityStatus(p, null, tournaments)!=="available").length;

  return (
    <div style={{ background:"#080c14", minHeight:"100vh", maxWidth:430, margin:"0 auto",
      fontFamily:"'Barlow',sans-serif", color:"#f8fafc", position:"relative", overflowX:"hidden",
      backgroundImage:"radial-gradient(ellipse at 20% 0%,rgba(30,58,138,0.25) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(22,101,52,0.15) 0%,transparent 60%)" }}>

      {syncStatus==="offline" && (
        <div className="offline-banner" style={{ background:"rgba(244,63,94,0.12)", borderBottom:"1px solid rgba(244,63,94,0.3)",
          padding:"8px 16px", display:"flex", alignItems:"center", gap:8,
          fontSize:12, color:"#f87171", fontWeight:600, position:"sticky", top:0, zIndex:30 }}>
          {I.warning} Offline — changes will sync when reconnected
        </div>
      )}

      {/* ── Header ── */}
      <div style={{ background:"rgba(8,12,20,0.9)", backdropFilter:"blur(16px)",
        borderBottom:"1px solid rgba(255,255,255,0.06)",
        padding:"10px 14px",
        position:"sticky", top:syncStatus==="offline"?33:0, zIndex:20 }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          {/* Logo */}
          <div style={{ width:36, height:36, borderRadius:"50%", background:"#111",
            border:"2.5px solid #90c4e4", display:"flex", alignItems:"center", justifyContent:"center",
            fontSize:18, fontWeight:900, color:"white", flexShrink:0 }}>P</div>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontSize:15, fontWeight:800, color:"#f8fafc", fontFamily:"'Bebas Neue',cursive", letterSpacing:2, lineHeight:1 }}>PRIME PITCHING</div>
            <div style={{ fontSize:10, color:"rgba(255,255,255,0.4)", letterSpacing:0.3, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
              {teamMeta?.name} · {APP_VERSION}
            </div>
          </div>
          <div style={{ display:"flex", gap:5, alignItems:"center" }}>
            {availableCount>0 && <div style={{ padding:"3px 8px", borderRadius:8, background:"rgba(74,222,128,0.15)", fontSize:11, fontWeight:700, color:"#4ade80" }}>{availableCount}✓</div>}
            {restingCount>0  && <div style={{ padding:"3px 8px", borderRadius:8, background:"rgba(244,63,94,0.15)",  fontSize:11, fontWeight:700, color:"#f43f5e" }}>{restingCount}😴</div>}
            <div title={syncStatus} style={{ width:7, height:7, borderRadius:"50%", flexShrink:0,
              background: syncStatus==="synced"?"#4ade80": syncStatus==="saving"?"#fbbf24": syncStatus==="offline"?"#f43f5e":"rgba(255,255,255,0.3)",
              boxShadow:  syncStatus==="synced"?"0 0 6px #4ade80": syncStatus==="saving"?"0 0 6px #fbbf24": syncStatus==="offline"?"0 0 6px #f43f5e":"none",
              transition:"background 0.4s, box-shadow 0.4s" }}/>
            <button onClick={()=>setShowTeamPicker(true)}
              style={{ background:"rgba(255,255,255,0.07)", border:"1px solid rgba(255,255,255,0.1)",
                borderRadius:8, padding:"5px 8px", color:"rgba(255,255,255,0.5)", cursor:"pointer",
                fontSize:11, fontWeight:700, letterSpacing:0.5 }}>
              TEAM
            </button>
          </div>
        </div>
      </div>

      {/* ── Screens ── */}
      <div>
        {tab==="roster" && selectedPlayer ? (
          <PitcherDetail pitcher={selectedPlayer} onBack={()=>setSelectedPlayer(null)}
            onLog={logGame} onDelete={deletePlayer} tournaments={tournaments}
            onEditGame={editGame} onDeleteGame={deleteGame} onEditPlayer={editPlayer}/>
        ) : tab==="roster" ? (
          <RosterScreen roster={roster} tournaments={tournaments} onAdd={addPlayer} onSelect={p=>setSelectedPlayer(p)} onEditPlayer={editPlayer}/>
        ) : tab==="gamelog" ? (
          <GameLogScreen roster={roster} onLogMultiple={logMultiple} tournaments={tournaments}
            onEditGame={editGame} onDeleteGame={deleteGame}/>
        ) : tab==="eligibility" ? (
          <EligibilityScreen roster={roster} tournaments={tournaments}/>
        ) : tab==="tournament" ? (
          <TournamentScreen roster={roster} tournaments={tournaments} onAddTourney={addTourney} onDeleteTourney={deleteTourney} onUpdateTourney={updateTourney}/>
        ) : (
          <SeasonHistory roster={roster} tournaments={tournaments} onEditGame={editGame} onDeleteGame={deleteGame}/>
        )}
      </div>

      {/* ── Bottom nav ── */}
      <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)",
        width:"100%", maxWidth:430, background:"rgba(8,12,20,0.97)", backdropFilter:"blur(20px)",
        borderTop:"1px solid rgba(255,255,255,0.07)", paddingBottom:"env(safe-area-inset-bottom,0px)" }}>
        <div style={{ display:"flex" }}>
          {TABS.map(t=>{
            const active = (tab===t.id && !selectedPlayer) || (tab==="roster" && selectedPlayer && t.id==="roster");
            return (
              <button key={t.id} onClick={()=>{ setTab(t.id); if(t.id!=="roster") setSelectedPlayer(null); }}
                style={{ flex:1, background:"transparent", border:"none", cursor:"pointer",
                  padding:"9px 0 7px", display:"flex", flexDirection:"column", alignItems:"center", gap:2 }}>
                <div style={{ color:active?"#38bdf8":"rgba(255,255,255,0.3)", transition:"color 0.2s" }}>{t.icon}</div>
                <span style={{ fontSize:10, fontWeight:700, letterSpacing:0.5,
                  color:active?"#38bdf8":"rgba(255,255,255,0.3)", transition:"color 0.2s" }}>
                  {t.label.toUpperCase()}
                </span>
                {active && <div style={{ width:14, height:2, background:"#38bdf8", borderRadius:1 }}/>}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

window.__PitchApp = App;

  <!-- Service worker for offline shell -->

  <script>
    // Version check: compare the version in the currently-running HTML against what the
    // server actually has right now. Uses a live network fetch (cache:no-store) so that
    // iOS PWA's native page cache can't hide a new deploy. Reloads + clears caches on mismatch.
    (function() {
      const VERSION_KEY = 'pt_app_version';
      const running = document.querySelector('meta[name="app-version"]')?.content || '';

      function applyUpdate(latest) {
        localStorage.setItem(VERSION_KEY, latest);
        const clear = 'caches' in window
          ? caches.keys().then(ks => Promise.all(ks.map(k => caches.delete(k))))
          : Promise.resolve();
        clear.then(() => location.reload(true));
      }

      // Always store the running version so we have a baseline.
      if (running) localStorage.setItem(VERSION_KEY, running);

      // Fetch the live page from the network (bypasses every cache layer).
      fetch(location.pathname + '?_v=' + Date.now(), {
        cache: 'no-store',
        headers: { 'Accept': 'text/html' }
      })
      .then(r => r.ok ? r.text() : null)
      .then(html => {
        if (!html) return;
        const m = html.match(/name="app-version"\s+content="([^"]+)"/);
        const latest = m && m[1];
        if (latest && latest !== running) applyUpdate(latest);
      })
      .catch(() => {}); // silent fail when offline
    })();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const swCode = `
          const CACHE = 'pitch-tracker-fb-v5';
          self.addEventListener('install', e => {
            e.waitUntil(caches.open(CACHE).then(c => c.add(location.href)).then(() => self.skipWaiting()));
          });
          self.addEventListener('activate', e => {
            e.waitUntil(
              caches.keys().then(keys =>
                Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
              ).then(() => self.clients.claim())
            );
          });
          self.addEventListener('fetch', e => {
            // Let Firebase/network requests pass through uncached
            if (e.request.url.includes('firebaseio.com') ||
                e.request.url.includes('googleapis.com') ||
                e.request.url.includes('gstatic.com')) {
              e.respondWith(fetch(e.request).catch(() => new Response('', {status: 503})));
              return;
            }
            // Network-first for HTML navigation so deploys are picked up immediately
            if (e.request.mode === 'navigate') {
              e.respondWith(
                fetch(e.request).then(res => {
                  if (res && res.status === 200) {
                    caches.open(CACHE).then(c => c.put(e.request, res.clone()));
                  }
                  return res;
                }).catch(() => caches.match(e.request))
              );
              return;
            }
            // Cache-first for static CDN assets (fonts, scripts)
            e.respondWith(
              caches.match(e.request).then(r => r || fetch(e.request).then(res => {
                if (res && res.status === 200 && e.request.method === 'GET') {
                  caches.open(CACHE).then(c => c.put(e.request, res.clone()));
                }
                return res;
              }).catch(() => caches.match(e.request)))
            );
          });
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
      });
    }
  </script>
